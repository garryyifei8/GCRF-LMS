# GCRF Library Management System - Common Schemas
# 通用数据模型定义
# 版本: 1.0.0
# 创建日期: 2025-11-06

components:
  schemas:
    # ==================== 统一响应包装器 ====================

    # 通用响应格式 Result<T>
    Result:
      type: object
      required: [code, message, timestamp]
      properties:
        code:
          type: integer
          example: 200
          description: |
            业务状态码:
            - 200: 成功
            - 400: 参数错误
            - 401: 未认证
            - 403: 无权限
            - 404: 资源不存在
            - 500: 服务器错误
        message:
          type: string
          example: "success"
          description: 提示信息
        data:
          description: 业务数据 (具体类型由各API定义)
          nullable: true
        timestamp:
          type: string
          format: date-time
          example: "2025-11-06T10:00:00Z"
          description: 响应时间戳 (UTC时间)

    # 分页响应
    PageResult:
      allOf:
        - $ref: '#/components/schemas/Result'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/PageData'

    # 分页数据
    PageData:
      type: object
      required: [records, total, pageNum, pageSize, pages]
      properties:
        records:
          type: array
          items: {}
          description: 当前页数据列表
        total:
          type: integer
          format: int64
          example: 100
          description: 总记录数
        pageNum:
          type: integer
          example: 1
          description: 当前页码 (从1开始)
        pageSize:
          type: integer
          example: 20
          description: 每页大小
        pages:
          type: integer
          example: 5
          description: 总页数
        hasNext:
          type: boolean
          example: true
          description: 是否有下一页
        hasPrevious:
          type: boolean
          example: false
          description: 是否有上一页

    # 错误响应
    ErrorResult:
      allOf:
        - $ref: '#/components/schemas/Result'
        - type: object
          properties:
            code:
              type: integer
              enum: [400, 401, 403, 404, 500, 503]
            data:
              type: object
              nullable: true
              description: 错误详情
              properties:
                field:
                  type: string
                  description: 错误字段
                  example: "email"
                reason:
                  type: string
                  description: 错误原因
                  example: "邮箱格式不正确"
                traceId:
                  type: string
                  description: 追踪ID
                  example: "3c7e8f9a-1b2d-4e5f-8c9d-1a2b3c4d5e6f"
