---
# ============ AUTH SERVICE ============
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gcrf-auth
  namespace: gcrf-prod
  labels: { app: gcrf-auth }
spec:
  replicas: 1
  selector:
    matchLabels: { app: gcrf-auth }
  template:
    metadata:
      labels: { app: gcrf-auth }
    spec:
      containers:
        - name: auth
          image: gcrf/auth-service:latest
          imagePullPolicy: Never
          ports: [{ containerPort: 8081 }]
          envFrom:
            - configMapRef: { name: gcrf-config }
            - secretRef: { name: gcrf-db-secret }
          env:
            - name: SERVER_PORT
              value: "8081"
            - name: SPRING_PROFILES_ACTIVE
              value: prod
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgresql.edu-infra.svc.cluster.local:5432/gcrf_auth?stringtype=unspecified"
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom: { secretKeyRef: { name: gcrf-db-secret, key: POSTGRES_USER } }
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom: { secretKeyRef: { name: gcrf-db-secret, key: POSTGRES_PASSWORD } }
            - name: SPRING_REDIS_HOST
              value: redis.edu-infra.svc.cluster.local
            - name: SPRING_REDIS_PORT
              value: "6379"
            - name: SPRING_REDIS_PASSWORD
              valueFrom: { secretKeyRef: { name: gcrf-db-secret, key: REDIS_PASSWORD } }
            - name: SPRING_REDIS_DATABASE
              value: "1"
            - name: SPRING_DATA_REDIS_HOST
              value: redis.edu-infra.svc.cluster.local
            - name: SPRING_DATA_REDIS_PORT
              value: "6379"
            - name: SPRING_DATA_REDIS_PASSWORD
              valueFrom: { secretKeyRef: { name: gcrf-db-secret, key: REDIS_PASSWORD } }
            - name: SPRING_DATA_REDIS_DATABASE
              value: "1"
            - name: JWT_SECRET
              valueFrom: { secretKeyRef: { name: gcrf-db-secret, key: JWT_SECRET } }
          resources:
            requests: { memory: "384Mi", cpu: "100m" }
            limits: { memory: "512Mi", cpu: "500m" }
          readinessProbe:
            httpGet: { path: /actuator/health, port: 8081 }
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: gcrf-auth
  namespace: gcrf-prod
spec:
  selector: { app: gcrf-auth }
  ports: [{ port: 8081, targetPort: 8081 }]

