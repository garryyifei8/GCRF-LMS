---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gcrf-nginx-config
  namespace: gcrf-prod
data:
  default.conf: |
    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # SPA routing
        location / {
            try_files $uri $uri/ /index.html;
        }

        # API proxy → backend services via K8s DNS
        location /api/v1/auth {
            proxy_pass http://gcrf-auth:8081;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /api/v1/books {
            proxy_pass http://gcrf-book:8082;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /api/v1/categories {
            proxy_pass http://gcrf-book:8082;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /api/v1/inventory {
            proxy_pass http://gcrf-book:8082;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /api/v1/readers {
            proxy_pass http://gcrf-reader:8084;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /api/v1/borrows {
            proxy_pass http://gcrf-circulation:8083;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /api/v1/reserves {
            proxy_pass http://gcrf-circulation:8083;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /api/v1/circulation {
            proxy_pass http://gcrf-circulation:8083;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /api/v1/fines {
            proxy_pass http://gcrf-circulation:8083;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /api/v1/system {
            proxy_pass http://gcrf-system:8085;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /api/v1/analytics {
            proxy_pass http://gcrf-analytics:8089;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /api/v1/chat {
            proxy_pass http://gcrf-chat:8087;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /api/v1/recommend {
            proxy_pass http://gcrf-recommend:8086;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Static assets cache
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            expires 30d;
            add_header Cache-Control "public, no-transform";
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gcrf-web-admin
  namespace: gcrf-prod
  labels: { app: gcrf-web-admin }
spec:
  replicas: 1
  selector:
    matchLabels: { app: gcrf-web-admin }
  template:
    metadata:
      labels: { app: gcrf-web-admin }
    spec:
      containers:
        - name: nginx
          image: gcrf/web-admin:latest
          imagePullPolicy: Never
          ports: [{ containerPort: 80 }]
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          resources:
            requests: { memory: "64Mi", cpu: "50m" }
            limits: { memory: "128Mi", cpu: "200m" }
          readinessProbe:
            httpGet: { path: /, port: 80 }
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: nginx-config
          configMap:
            name: gcrf-nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: gcrf-web-admin
  namespace: gcrf-prod
spec:
  type: NodePort
  selector: { app: gcrf-web-admin }
  ports:
    - port: 80
      targetPort: 80
      nodePort: 31080
