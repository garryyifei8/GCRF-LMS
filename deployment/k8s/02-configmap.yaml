apiVersion: v1
kind: ConfigMap
metadata:
  name: gcrf-config
  namespace: gcrf-prod
data:
  SPRING_PROFILES_ACTIVE: prod
  # Services discover each other via K8s DNS
  SPRING_CLOUD_NACOS_DISCOVERY_ENABLED: "false"
  SPRING_CLOUD_NACOS_CONFIG_ENABLED: "false"
  SPRING_MAIN_ALLOW_BEAN_DEFINITION_OVERRIDING: "true"
  # Redis uses DB 1 to isolate from edu-platform (DB 0)
  SPRING_REDIS_DATABASE: "1"
  SPRING_DATA_REDIS_DATABASE: "1"
  # Management
  MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,prometheus
  MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: always
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gcrf-service-discovery
  namespace: gcrf-prod
data:
  # SimpleDiscoveryClient config for Feign inter-service calls
  application-k8s.yml: |
    spring:
      cloud:
        discovery:
          client:
            simple:
              instances:
                reader-service:
                  - uri: http://gcrf-reader:8084
                book-service:
                  - uri: http://gcrf-book:8082
                auth-service:
                  - uri: http://gcrf-auth:8081
                circulation-service:
                  - uri: http://gcrf-circulation:8083
                system-service:
                  - uri: http://gcrf-system:8085
                org-service:
                  - uri: http://gcrf-org:8090
                opac-service:
                  - uri: http://gcrf-opac:8092
