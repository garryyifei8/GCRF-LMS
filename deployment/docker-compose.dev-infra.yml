version: '3.8'

# GCRF Dev Infrastructure — offset ports to coexist with edu-dev
# Usage: docker compose --env-file .env.dev -f docker-compose.dev-infra.yml up -d

services:
  postgres:
    image: postgres:15-alpine
    container_name: gcrf-dev-postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:25432:5432"
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=en_US.UTF-8"
    volumes:
      - gcrf-dev-pg-data:/var/lib/postgresql/data
      - ./postgresql/init-scripts:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -h localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - gcrf-dev-network

  redis:
    image: redis:7.2-alpine
    container_name: gcrf-dev-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:26379:6379"
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - gcrf-dev-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gcrf-dev-network

  nacos:
    image: nacos/nacos-server:v2.3.0
    platform: linux/amd64
    container_name: gcrf-dev-nacos
    restart: unless-stopped
    ports:
      - "127.0.0.1:28848:8848"
      - "127.0.0.1:29848:9848"
    environment:
      MODE: standalone
      SPRING_DATASOURCE_PLATFORM: ""
      NACOS_AUTH_ENABLE: "false"
      JVM_XMS: 256m
      JVM_XMX: 256m
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8848/nacos/"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - gcrf-dev-network

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: gcrf-dev-rabbitmq
    restart: unless-stopped
    ports:
      - "127.0.0.1:25672:5672"
      - "127.0.0.1:35672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST}
    volumes:
      - gcrf-dev-mq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - gcrf-dev-network

  minio:
    image: minio/minio:latest
    container_name: gcrf-dev-minio
    restart: unless-stopped
    ports:
      - "127.0.0.1:29000:9000"
      - "127.0.0.1:29001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - gcrf-dev-minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - gcrf-dev-network

volumes:
  gcrf-dev-pg-data:
  gcrf-dev-redis-data:
  gcrf-dev-mq-data:
  gcrf-dev-minio-data:

networks:
  gcrf-dev-network:
    name: gcrf-dev-network
    driver: bridge
