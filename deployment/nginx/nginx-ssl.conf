# ============================================
# GCRF Library Management System
# Production Nginx HTTPS Configuration
# ============================================
# This configuration provides:
#   - TLS 1.2/1.3 with strong cipher suites
#   - HSTS (HTTP Strict Transport Security)
#   - OCSP Stapling
#   - HTTP to HTTPS redirection
#   - Optimized SSL session caching
#   - Security headers
#
# Prerequisites:
#   - SSL certificates in /etc/nginx/ssl/
#   - Certificate files: fullchain.pem, privkey.pem
#   - DHPARAM file: dhparam.pem (generated)
# ============================================

user  nginx;
worker_processes  auto;
worker_rlimit_nofile 65535;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ============================================
    # Logging Configuration
    # ============================================
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    log_format  json  '{"time":"$time_iso8601",'
                      '"remote_addr":"$remote_addr",'
                      '"remote_user":"$remote_user",'
                      '"request":"$request",'
                      '"status":"$status",'
                      '"body_bytes_sent":"$body_bytes_sent",'
                      '"request_time":"$request_time",'
                      '"http_referrer":"$http_referer",'
                      '"http_user_agent":"$http_user_agent",'
                      '"http_x_forwarded_for":"$http_x_forwarded_for",'
                      '"ssl_protocol":"$ssl_protocol",'
                      '"ssl_cipher":"$ssl_cipher"}';

    access_log  /var/log/nginx/access.log  json;

    # ============================================
    # Performance Optimizations
    # ============================================
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    server_tokens      off;  # Hide nginx version

    # Client body size limit
    client_max_body_size 50M;
    client_body_timeout 60s;
    client_header_timeout 60s;

    # ============================================
    # Gzip Compression
    # ============================================
    gzip  on;
    gzip_vary on;
    gzip_min_length 1k;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/vnd.ms-fontobject
        application/x-font-ttf
        font/opentype
        font/truetype
        image/svg+xml
        image/x-icon;
    gzip_disable "MSIE [1-6]\.";

    # ============================================
    # SSL Configuration
    # ============================================
    # TLS 1.2 and 1.3 only (disable older insecure versions)
    ssl_protocols TLSv1.2 TLSv1.3;

    # Strong cipher suites (Mozilla Modern configuration)
    # Reference: https://ssl-config.mozilla.org/
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # SSL session caching for performance
    ssl_session_cache shared:SSL:50m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;  # Disable for better security

    # Diffie-Hellman parameters for DHE ciphers
    ssl_dhparam /etc/nginx/ssl/dhparam.pem;

    # ECDH curve
    ssl_ecdh_curve secp384r1;

    # ============================================
    # OCSP Stapling
    # ============================================
    ssl_stapling on;
    ssl_stapling_verify on;
    # Google and Cloudflare DNS for OCSP resolution
    resolver 8.8.8.8 1.1.1.1 valid=300s;
    resolver_timeout 5s;

    # ============================================
    # Rate Limiting
    # ============================================
    # Limit requests per IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ============================================
    # Upstream Definitions
    # ============================================
    upstream gateway_backend {
        server gcrf-gateway-service:8080;
        keepalive 32;
    }

    # ============================================
    # HTTP Server - Redirect to HTTPS
    # ============================================
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        # ACME challenge for Let's Encrypt
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            allow all;
        }

        # Redirect all other HTTP traffic to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ============================================
    # HTTPS Server - Main Application
    # ============================================
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name _;

        # SSL Certificate files
        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        # Trusted CA certificates for OCSP stapling
        ssl_trusted_certificate /etc/nginx/ssl/chain.pem;

        # ============================================
        # Security Headers
        # ============================================
        # HSTS - HTTP Strict Transport Security
        # max-age=31536000 (1 year), includeSubDomains, preload
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        # Prevent clickjacking
        add_header X-Frame-Options "SAMEORIGIN" always;

        # Prevent MIME type sniffing
        add_header X-Content-Type-Options "nosniff" always;

        # XSS Protection
        add_header X-XSS-Protection "1; mode=block" always;

        # Referrer Policy
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Content Security Policy (adjust as needed for your application)
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https:; frame-ancestors 'self';" always;

        # Permissions Policy
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;

        # ============================================
        # Root and Index
        # ============================================
        root /usr/share/nginx/html;
        index index.html index.htm;
        charset utf-8;

        # ============================================
        # Static Assets with Caching
        # ============================================
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|map)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
            access_log off;
        }

        # ============================================
        # SPA Application Routes
        # ============================================
        location / {
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        }

        # ============================================
        # API Proxy to Gateway
        # ============================================
        location /api/ {
            # Rate limiting
            limit_req zone=api_limit burst=20 nodelay;
            limit_conn conn_limit 10;

            # Proxy settings
            proxy_pass http://gateway_backend/;
            proxy_http_version 1.1;

            # Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header Connection "";

            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # Buffer settings
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            proxy_busy_buffers_size 8k;

            # Error handling
            proxy_intercept_errors off;
            proxy_next_upstream error timeout http_502 http_503 http_504;
        }

        # ============================================
        # Login Endpoint with Stricter Rate Limiting
        # ============================================
        location /api/auth/login {
            limit_req zone=login_limit burst=3 nodelay;
            limit_conn conn_limit 5;

            proxy_pass http://gateway_backend/auth/login;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # ============================================
        # WebSocket Support (if needed)
        # ============================================
        location /ws/ {
            proxy_pass http://gateway_backend/ws/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
        }

        # ============================================
        # Health Check Endpoint
        # ============================================
        location /health {
            access_log off;
            return 200 '{"status":"healthy","timestamp":"$time_iso8601"}';
            add_header Content-Type application/json;
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        }

        # ============================================
        # Nginx Status (for monitoring, restrict access)
        # ============================================
        location /nginx_status {
            stub_status on;
            access_log off;
            # Restrict to internal networks only
            allow 127.0.0.1;
            allow 172.16.0.0/12;
            allow 10.0.0.0/8;
            allow 192.168.0.0/16;
            deny all;
        }

        # ============================================
        # Deny Access to Hidden Files
        # ============================================
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        # ============================================
        # Error Pages
        # ============================================
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }

        error_page 404 /404.html;
        location = /404.html {
            root /usr/share/nginx/html;
            internal;
        }
    }
}
