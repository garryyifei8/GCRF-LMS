# GCRF Library Management System - Observability Stack
# Prometheus + Grafana + Loki + Promtail
# Version: 1.0.0
# Last Updated: 2025-12-01
#
# Purpose:
#   - Metrics collection and visualization (Prometheus + Grafana)
#   - Log aggregation and analysis (Loki + Promtail)
#   - Unified observability platform
#
# Usage:
#   # Start observability stack
#   docker-compose -f docker-compose.observability.yml up -d
#
#   # Access points:
#   - Grafana: http://localhost:3000 (admin/admin)
#   - Prometheus: http://localhost:9090
#   - Loki: http://localhost:3100 (internal)
#
# Prerequisites:
#   - Infrastructure services running (docker-compose.infrastructure.yml)
#   - Application services running (docker-compose.services.yml)

version: '3.8'

networks:
  gcrf-observability-network:
    name: gcrf-observability-network
    driver: bridge
  gcrf-backend-network:
    name: gcrf-infrastructure-network
    external: true

volumes:
  prometheus-data:
    name: gcrf-prometheus-data
  grafana-data:
    name: gcrf-grafana-data
  loki-data:
    name: gcrf-loki-data

services:
  # ===========================================
  # Prometheus - Metrics Collection & Storage
  # ===========================================
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: gcrf-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--storage.tsdb.retention.size=10GB'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts:/etc/prometheus/alerts:ro
      - ./monitoring/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    networks:
      - gcrf-observability-network
      - gcrf-backend-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    labels:
      com.gcrf.service: "prometheus"
      com.gcrf.tier: "observability"
      com.gcrf.component: "metrics"

  # ===========================================
  # Loki - Log Aggregation & Storage
  # ===========================================
  loki:
    image: grafana/loki:2.9.3
    container_name: gcrf-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yml
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    networks:
      - gcrf-observability-network
      - gcrf-backend-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    labels:
      com.gcrf.service: "loki"
      com.gcrf.tier: "observability"
      com.gcrf.component: "logs"

  # ===========================================
  # Promtail - Log Collection Agent
  # ===========================================
  promtail:
    image: grafana/promtail:2.9.3
    container_name: gcrf-promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      # Configuration
      - ./loki/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      # Docker socket for container log discovery
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Container logs directory
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      # Service log volumes
      - ./logs:/var/log/gcrf:ro
      # Journal logs (Linux only)
      - /var/log/journal:/var/log/journal:ro
      # Machine ID for journal (Linux only)
      - /etc/machine-id:/etc/machine-id:ro
      # Positions file persistence
      - promtail-positions:/tmp
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-development}
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - gcrf-observability-network
      - gcrf-backend-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9080/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
    labels:
      com.gcrf.service: "promtail"
      com.gcrf.tier: "observability"
      com.gcrf.component: "log-collector"

  # ===========================================
  # Grafana - Visualization Platform
  # ===========================================
  grafana:
    image: grafana/grafana:10.2.2
    container_name: gcrf-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Security
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_SECURITY_ALLOW_EMBEDDING=true

      # Server
      - GF_SERVER_ROOT_URL=${GRAFANA_ROOT_URL:-http://localhost:3000}
      - GF_SERVER_SERVE_FROM_SUB_PATH=false

      # Users
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_USERS_ALLOW_ORG_CREATE=false

      # Auth
      - GF_AUTH_ANONYMOUS_ENABLED=false

      # Dashboards
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/gcrf-overview.json

      # Alerting
      - GF_ALERTING_ENABLED=false
      - GF_UNIFIED_ALERTING_ENABLED=true

      # Logging
      - GF_LOG_MODE=console
      - GF_LOG_LEVEL=info

      # Feature toggles for Loki
      - GF_FEATURE_TOGGLES_ENABLE=logsExploreTableVisualisation,lokiLogsDataplane

      # Explore settings
      - GF_EXPLORE_ENABLED=true
    volumes:
      # Provisioning (datasources, dashboards)
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      # Dashboards
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      # Data persistence
      - grafana-data:/var/lib/grafana
    networks:
      - gcrf-observability-network
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      com.gcrf.service: "grafana"
      com.gcrf.tier: "observability"
      com.gcrf.component: "visualization"

  # ===========================================
  # Node Exporter - Server Metrics
  # ===========================================
  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: gcrf-node-exporter
    restart: unless-stopped
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    networks:
      - gcrf-observability-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9100/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      com.gcrf.service: "node-exporter"
      com.gcrf.tier: "observability"
      com.gcrf.component: "metrics"

  # ===========================================
  # PostgreSQL Exporter - Database Metrics
  # ===========================================
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: gcrf-postgres-exporter
    restart: unless-stopped
    environment:
      - DATA_SOURCE_NAME=postgresql://${DB_USERNAME:-postgres}:${DB_PASSWORD}@gcrf-postgres-primary:5432/postgres?sslmode=disable
      - PG_EXPORTER_AUTO_DISCOVER_DATABASES=true
      - PG_EXPORTER_EXTEND_QUERY_PATH=/etc/postgres_exporter/queries.yml
    ports:
      - "9187:9187"
    volumes:
      - ./monitoring/exporters/postgres-queries.yml:/etc/postgres_exporter/queries.yml:ro
    networks:
      - gcrf-observability-network
      - gcrf-backend-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9187/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      com.gcrf.service: "postgres-exporter"
      com.gcrf.tier: "observability"
      com.gcrf.component: "metrics"

  # ===========================================
  # Redis Exporter - Cache Metrics
  # ===========================================
  redis-exporter:
    image: oliver006/redis_exporter:v1.55.0
    container_name: gcrf-redis-exporter
    restart: unless-stopped
    environment:
      - REDIS_ADDR=gcrf-redis-master:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_EXPORTER_CHECK_KEYS=*
      - REDIS_EXPORTER_CHECK_SINGLE_KEYS=*
    ports:
      - "9121:9121"
    networks:
      - gcrf-observability-network
      - gcrf-backend-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9121/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      com.gcrf.service: "redis-exporter"
      com.gcrf.tier: "observability"
      com.gcrf.component: "metrics"

# ===========================================
# Additional Volume for Promtail positions
# ===========================================
  # Already defined above in volumes section

# ===========================================
# Volume Definitions
# ===========================================
# Note: Main volumes defined at top level
# This section is for additional volume configuration
volumes:
  prometheus-data:
    name: gcrf-prometheus-data
    driver: local
    labels:
      com.gcrf.volume: "metrics"
      com.gcrf.backup: "important"
  grafana-data:
    name: gcrf-grafana-data
    driver: local
    labels:
      com.gcrf.volume: "visualization"
      com.gcrf.backup: "important"
  loki-data:
    name: gcrf-loki-data
    driver: local
    labels:
      com.gcrf.volume: "logs"
      com.gcrf.backup: "critical"
  promtail-positions:
    name: gcrf-promtail-positions
    driver: local
    labels:
      com.gcrf.volume: "log-positions"
      com.gcrf.backup: "low"
