# GCRF Library Management System - PostgreSQL Custom Queries
# Additional metrics beyond pg_exporter defaults
# Last Updated: 2025-11-01

# Database size by service
pg_database_size:
  query: "SELECT datname, pg_database_size(datname) as size_bytes FROM pg_database WHERE datname IN ('gcrf_auth', 'gcrf_book', 'gcrf_reader', 'gcrf_circulation', 'gcrf_system')"
  master: true
  metrics:
    - datname:
        usage: "LABEL"
        description: "Database name"
    - size_bytes:
        usage: "GAUGE"
        description: "Database size in bytes"

# Table sizes
pg_table_size:
  query: |
    SELECT
      schemaname,
      tablename,
      pg_total_relation_size(schemaname||'.'||tablename) as size_bytes,
      pg_relation_size(schemaname||'.'||tablename) as table_bytes,
      pg_indexes_size(schemaname||'.'||tablename) as index_bytes
    FROM pg_tables
    WHERE schemaname NOT IN ('pg_catalog', 'information_schema')
    ORDER BY size_bytes DESC
    LIMIT 20
  master: true
  metrics:
    - schemaname:
        usage: "LABEL"
        description: "Schema name"
    - tablename:
        usage: "LABEL"
        description: "Table name"
    - size_bytes:
        usage: "GAUGE"
        description: "Total table size including indexes"
    - table_bytes:
        usage: "GAUGE"
        description: "Table data size"
    - index_bytes:
        usage: "GAUGE"
        description: "Index size"

# Active connections by database
pg_active_connections:
  query: |
    SELECT
      datname,
      COUNT(*) as connections
    FROM pg_stat_activity
    WHERE datname IS NOT NULL
    GROUP BY datname
  metrics:
    - datname:
        usage: "LABEL"
        description: "Database name"
    - connections:
        usage: "GAUGE"
        description: "Number of active connections"

# Long running queries
pg_long_running_queries:
  query: |
    SELECT
      datname,
      usename,
      state,
      COUNT(*) as count
    FROM pg_stat_activity
    WHERE state != 'idle'
      AND query_start < NOW() - INTERVAL '5 minutes'
      AND datname IS NOT NULL
    GROUP BY datname, usename, state
  metrics:
    - datname:
        usage: "LABEL"
        description: "Database name"
    - usename:
        usage: "LABEL"
        description: "User name"
    - state:
        usage: "LABEL"
        description: "Query state"
    - count:
        usage: "GAUGE"
        description: "Number of long running queries"

# Replication lag (for replicas)
pg_replication_lag:
  query: |
    SELECT
      CASE WHEN pg_last_wal_receive_lsn() = pg_last_wal_replay_lsn()
        THEN 0
        ELSE EXTRACT(EPOCH FROM now() - pg_last_xact_replay_timestamp())
      END AS lag_seconds
  metrics:
    - lag_seconds:
        usage: "GAUGE"
        description: "Replication lag in seconds"

# Deadlocks
pg_deadlocks:
  query: "SELECT datname, deadlocks FROM pg_stat_database WHERE datname IS NOT NULL"
  metrics:
    - datname:
        usage: "LABEL"
        description: "Database name"
    - deadlocks:
        usage: "COUNTER"
        description: "Number of deadlocks detected"

# Cache hit ratio
pg_cache_hit_ratio:
  query: |
    SELECT
      datname,
      CASE WHEN (blks_hit + blks_read) = 0
        THEN 0
        ELSE (blks_hit::float / (blks_hit + blks_read)) * 100
      END as cache_hit_ratio
    FROM pg_stat_database
    WHERE datname IS NOT NULL
  metrics:
    - datname:
        usage: "LABEL"
        description: "Database name"
    - cache_hit_ratio:
        usage: "GAUGE"
        description: "Cache hit ratio percentage"
