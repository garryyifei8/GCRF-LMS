# Grafana Datasource Configuration
# Auto-provision InfluxDB for k6 performance test results
# Version: 1.0.0
# Last Updated: 2025-12-01

apiVersion: 1

datasources:
  - name: k6-InfluxDB
    type: influxdb
    uid: k6-influxdb
    access: proxy
    url: http://gcrf-influxdb:8086
    database: k6
    isDefault: false
    editable: true
    jsonData:
      httpMode: GET
      timeInterval: '5s'
    version: 1
