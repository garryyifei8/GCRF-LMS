# Grafana Dashboard Provisioning Configuration
# Auto-load dashboards from the dashboards directory

apiVersion: 1

providers:
  - name: 'GCRF Dashboards'
    orgId: 1
    folder: 'GCRF Library System'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
