version: '3.8'

# ============================================
# GCRF Library Management System
# Infrastructure Services Orchestration
# ============================================
# This file orchestrates all infrastructure components required for the GCRF Library System
# including PostgreSQL, Redis, Nacos, RabbitMQ, and MinIO.
#
# Usage:
#   docker-compose -f docker-compose.infrastructure.yml up -d
#
# Prerequisites:
#   - Copy ../.env.prod.example to ../.env and set all values
#   - Ensure Docker and Docker Compose are installed
# ============================================

services:
  # ============================================
  # PostgreSQL Primary Database
  # ============================================
  # Main relational database for all microservices
  # Note: Starting with standalone mode, clustering can be added later
  postgres-primary:
    image: postgres:15-alpine
    container_name: gcrf-postgres-primary
    restart: unless-stopped
    environment:
      # PostgreSQL superuser password from environment
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      # Character encoding for all databases
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=en_US.UTF-8"
      # Enable query logging in development (comment out for production)
      # POSTGRES_INITDB_ARGS: "-E UTF8 --locale=en_US.UTF-8 -c log_statement=all"
    volumes:
      # Named volume for data persistence
      - postgres-primary-data:/var/lib/postgresql/data
      # Mount initialization scripts (read-only)
      - ./postgresql/init-scripts:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -h localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - gcrf-infrastructure-network
    labels:
      com.gcrf.service: "database"
      com.gcrf.tier: "infrastructure"
      com.gcrf.component: "postgresql"

  # ============================================
  # Redis Master (Cache & Session Store)
  # ============================================
  # In-memory data store for caching and session management
  redis-master:
    image: redis:7.2-alpine
    container_name: gcrf-redis-master
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --appendfsync everysec
      --save 900 1
      --save 300 10
      --save 60 10000
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --tcp-keepalive 60
      --timeout 300
      --loglevel notice
    volumes:
      # Named volume for Redis data persistence (AOF and RDB files)
      - redis-master-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping | grep -q PONG"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 30s
    networks:
      - gcrf-infrastructure-network
    labels:
      com.gcrf.service: "cache"
      com.gcrf.tier: "infrastructure"
      com.gcrf.component: "redis"

  # ============================================
  # Nacos MySQL Backend
  # ============================================
  # Dedicated MySQL instance for Nacos configuration storage
  nacos-mysql:
    image: mysql:8.0
    container_name: gcrf-nacos-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${NACOS_MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: nacos_config
      MYSQL_USER: nacos
      MYSQL_PASSWORD: ${NACOS_MYSQL_PASSWORD}
      # MySQL 8.0 specific configurations
      MYSQL_ROOT_HOST: '%'
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max_connections=1000
      --max_allowed_packet=1024M
    volumes:
      # Named volume for MySQL data
      - nacos-mysql-data:/var/lib/mysql
      # Mount Nacos schema initialization script
      - ./nacos/nacos-mysql-schema.sql:/docker-entrypoint-initdb.d/01-nacos-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p${NACOS_MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - gcrf-infrastructure-network
    labels:
      com.gcrf.service: "database"
      com.gcrf.tier: "infrastructure"
      com.gcrf.component: "nacos-mysql"

  # ============================================
  # Nacos Service Discovery & Configuration
  # ============================================
  # Service registry and configuration management
  nacos:
    image: nacos/nacos-server:v2.3.0
    container_name: gcrf-nacos
    restart: unless-stopped
    ports:
      # HTTP API port (expose only to localhost for security)
      - "127.0.0.1:8848:8848"
      # gRPC port for service communication (expose only to localhost)
      - "127.0.0.1:9848:9848"
    environment:
      # Standalone mode for initial deployment
      MODE: standalone
      # Spring datasource configuration for MySQL backend
      SPRING_DATASOURCE_PLATFORM: mysql
      MYSQL_SERVICE_HOST: nacos-mysql
      MYSQL_SERVICE_PORT: 3306
      MYSQL_SERVICE_DB_NAME: nacos_config
      MYSQL_SERVICE_USER: nacos
      MYSQL_SERVICE_PASSWORD: ${NACOS_MYSQL_PASSWORD}
      # Nacos server configuration
      NACOS_SERVER_PORT: 8848
      # Authentication settings
      NACOS_AUTH_ENABLE: "true"
      NACOS_AUTH_TOKEN: ${NACOS_AUTH_TOKEN}
      NACOS_AUTH_IDENTITY_KEY: ${NACOS_USERNAME}
      NACOS_AUTH_IDENTITY_VALUE: ${NACOS_PASSWORD}
      # JVM settings for production
      JVM_XMS: 512m
      JVM_XMX: 512m
      JVM_XMN: 256m
    depends_on:
      nacos-mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    networks:
      - gcrf-infrastructure-network
    labels:
      com.gcrf.service: "service-discovery"
      com.gcrf.tier: "infrastructure"
      com.gcrf.component: "nacos"

  # ============================================
  # RabbitMQ Message Broker
  # ============================================
  # Message queue for asynchronous communication between services
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: gcrf-rabbitmq
    restart: unless-stopped
    ports:
      # AMQP port (internal only, services access via Docker network)
      - "127.0.0.1:5672:5672"
      # Management UI (expose only to localhost)
      - "127.0.0.1:15672:15672"
    environment:
      # Default user credentials
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      # Virtual host configuration
      RABBITMQ_DEFAULT_VHOST: gcrf
      # Enable management plugin features
      RABBITMQ_MANAGEMENT_ALLOW_WEB_ACCESS: "true"
      # Erlang cookie for clustering (future use)
      RABBITMQ_ERLANG_COOKIE: ${RABBITMQ_ERLANG_COOKIE:-gcrf-rabbitmq-cookie}
      # Memory high watermark (80% of container memory)
      RABBITMQ_VM_MEMORY_HIGH_WATERMARK: 0.8
      # Disk free limit (2GB minimum)
      RABBITMQ_DISK_FREE_LIMIT: 2GB
    volumes:
      # Named volume for RabbitMQ data persistence
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - gcrf-infrastructure-network
    labels:
      com.gcrf.service: "message-broker"
      com.gcrf.tier: "infrastructure"
      com.gcrf.component: "rabbitmq"

  # ============================================
  # MinIO Object Storage
  # ============================================
  # S3-compatible object storage for files and documents
  minio:
    image: minio/minio:latest
    container_name: gcrf-minio
    restart: unless-stopped
    ports:
      # MinIO API port (S3 compatible)
      - "127.0.0.1:9000:9000"
      # MinIO Console web UI (expose only to localhost)
      - "127.0.0.1:9001:9001"
    environment:
      # MinIO root credentials
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      # MinIO configuration
      MINIO_BROWSER: "on"
      MINIO_PROMETHEUS_AUTH_TYPE: "public"
      # Region configuration (for S3 compatibility)
      MINIO_REGION_NAME: ${MINIO_REGION:-us-east-1}
      # Domain configuration for virtual host-style requests
      MINIO_DOMAIN: ${MINIO_DOMAIN:-localhost}
    command: server /data --console-address ":9001"
    volumes:
      # Named volume for MinIO object storage
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - gcrf-infrastructure-network
    labels:
      com.gcrf.service: "object-storage"
      com.gcrf.tier: "infrastructure"
      com.gcrf.component: "minio"

# ============================================
# Network Configuration
# ============================================
networks:
  # Infrastructure network for all backend services
  gcrf-infrastructure-network:
    driver: bridge
    name: gcrf-infrastructure-network
    # Set to false to allow backend services to connect
    internal: false
    ipam:
      driver: default
      config:
        - subnet: 172.28.0.0/16
          gateway: 172.28.0.1

# ============================================
# Volume Definitions
# ============================================
volumes:
  # PostgreSQL primary data volume
  postgres-primary-data:
    name: gcrf-postgres-primary-data
    driver: local
    labels:
      com.gcrf.volume: "database"
      com.gcrf.backup: "critical"

  # Redis master data volume
  redis-master-data:
    name: gcrf-redis-master-data
    driver: local
    labels:
      com.gcrf.volume: "cache"
      com.gcrf.backup: "important"

  # Nacos MySQL data volume
  nacos-mysql-data:
    name: gcrf-nacos-mysql-data
    driver: local
    labels:
      com.gcrf.volume: "config"
      com.gcrf.backup: "critical"

  # RabbitMQ data volume
  rabbitmq-data:
    name: gcrf-rabbitmq-data
    driver: local
    labels:
      com.gcrf.volume: "messaging"
      com.gcrf.backup: "important"

  # MinIO object storage volume
  minio-data:
    name: gcrf-minio-data
    driver: local
    labels:
      com.gcrf.volume: "objects"
      com.gcrf.backup: "critical"