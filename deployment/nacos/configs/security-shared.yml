# Security Configuration
security:
  # CORS settings
  cors:
    allowed-origins:
      - "http://localhost:3011"
      - "http://localhost:8080"
      - "http://localhost:3011"
    allowed-methods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS
    allowed-headers:
      - "*"
    exposed-headers:
      - Authorization
      - X-Total-Count
    allow-credentials: true
    max-age: 3600

  # Rate limiting
  rate-limit:
    enabled: true
    default-limit: 100
    default-duration: 60  # seconds

  # API endpoints that don't require authentication
  public-endpoints:
    - /api/v1/auth/login
    - /api/v1/auth/register
    - /api/v1/health
    - /actuator/health
    - /v3/api-docs/**
    - /swagger-ui/**
