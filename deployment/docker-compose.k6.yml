# GCRF Library Management System - k6 Performance Testing Stack
# Includes k6, InfluxDB for metrics storage, and integrates with Grafana
# Version: 1.0.0
# Last Updated: 2025-12-01
#
# Usage:
#   # Start the performance testing infrastructure
#   docker-compose -f docker-compose.k6.yml up -d
#
#   # Run a load test using Docker
#   docker-compose -f docker-compose.k6.yml run --rm k6 run /scripts/load-test.js
#
#   # Run with InfluxDB output
#   docker-compose -f docker-compose.k6.yml run --rm k6 run \
#     --out influxdb=http://influxdb:8086/k6 /scripts/load-test.js
#
#   # Stop the stack
#   docker-compose -f docker-compose.k6.yml down

version: '3.8'

networks:
  gcrf-performance-network:
    name: gcrf-performance-network
    driver: bridge
  gcrf-monitoring-network:
    name: gcrf-monitoring-network
    external: true  # Connect to existing monitoring network for Grafana integration
  gcrf-backend-network:
    name: gcrf-backend-network
    external: true  # Connect to backend services for testing

volumes:
  influxdb-data:
    name: gcrf-influxdb-data
  k6-results:
    name: gcrf-k6-results

services:
  # ===========================================
  # InfluxDB - Time Series Database for k6 Results
  # ===========================================
  influxdb:
    image: influxdb:1.8
    container_name: gcrf-influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      # Database configuration
      - INFLUXDB_DB=k6
      - INFLUXDB_HTTP_AUTH_ENABLED=false
      # Performance tuning
      - INFLUXDB_DATA_MAX_SERIES_PER_DATABASE=0
      - INFLUXDB_DATA_MAX_VALUES_PER_TAG=0
      # Retention policy
      - INFLUXDB_RETENTION_ENABLED=true
      - INFLUXDB_RETENTION_CHECK_INTERVAL=30m
    volumes:
      - influxdb-data:/var/lib/influxdb
    networks:
      - gcrf-performance-network
      - gcrf-monitoring-network
    healthcheck:
      test: ["CMD", "influx", "-execute", "SHOW DATABASES"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      com.gcrf.service: "influxdb"
      com.gcrf.tier: "performance-testing"

  # ===========================================
  # k6 - Load Testing Tool
  # ===========================================
  k6:
    image: grafana/k6:0.49.0
    container_name: gcrf-k6
    volumes:
      # Mount test scripts
      - ./performance:/scripts:ro
      # Mount results directory
      - k6-results:/results
    environment:
      # Base URL for tests (can be overridden)
      - K6_BASE_URL=${K6_BASE_URL:-http://gateway:8080}
      # Test user credentials
      - K6_ADMIN_USER=${K6_ADMIN_USER:-admin}
      - K6_ADMIN_PASS=${K6_ADMIN_PASS:-admin123}
      - K6_LIBRARIAN_USER=${K6_LIBRARIAN_USER:-librarian}
      - K6_LIBRARIAN_PASS=${K6_LIBRARIAN_PASS:-librarian123}
      - K6_READER_USER=${K6_READER_USER:-reader}
      - K6_READER_PASS=${K6_READER_PASS:-reader123}
      # Environment tag
      - K6_ENVIRONMENT=${K6_ENVIRONMENT:-docker}
      # Soak test duration (in minutes)
      - K6_SOAK_DURATION=${K6_SOAK_DURATION:-60}
    networks:
      - gcrf-performance-network
      - gcrf-backend-network
    depends_on:
      influxdb:
        condition: service_healthy
    # Default command - override with docker-compose run
    command: ["version"]
    labels:
      com.gcrf.service: "k6"
      com.gcrf.tier: "performance-testing"

  # ===========================================
  # k6 Load Test Runner (one-shot)
  # ===========================================
  k6-load:
    image: grafana/k6:0.49.0
    container_name: gcrf-k6-load
    profiles:
      - load-test
    volumes:
      - ./performance:/scripts:ro
      - k6-results:/results
    environment:
      - K6_BASE_URL=${K6_BASE_URL:-http://gateway:8080}
      - K6_ADMIN_USER=${K6_ADMIN_USER:-admin}
      - K6_ADMIN_PASS=${K6_ADMIN_PASS:-admin123}
      - K6_LIBRARIAN_USER=${K6_LIBRARIAN_USER:-librarian}
      - K6_LIBRARIAN_PASS=${K6_LIBRARIAN_PASS:-librarian123}
      - K6_READER_USER=${K6_READER_USER:-reader}
      - K6_READER_PASS=${K6_READER_PASS:-reader123}
      - K6_ENVIRONMENT=${K6_ENVIRONMENT:-docker}
    networks:
      - gcrf-performance-network
      - gcrf-backend-network
    depends_on:
      influxdb:
        condition: service_healthy
    command: >
      run
      --out influxdb=http://influxdb:8086/k6
      --summary-export=/results/load-test-summary.json
      /scripts/load-test.js
    labels:
      com.gcrf.service: "k6-load"
      com.gcrf.tier: "performance-testing"

  # ===========================================
  # k6 Stress Test Runner (one-shot)
  # ===========================================
  k6-stress:
    image: grafana/k6:0.49.0
    container_name: gcrf-k6-stress
    profiles:
      - stress-test
    volumes:
      - ./performance:/scripts:ro
      - k6-results:/results
    environment:
      - K6_BASE_URL=${K6_BASE_URL:-http://gateway:8080}
      - K6_ADMIN_USER=${K6_ADMIN_USER:-admin}
      - K6_ADMIN_PASS=${K6_ADMIN_PASS:-admin123}
      - K6_LIBRARIAN_USER=${K6_LIBRARIAN_USER:-librarian}
      - K6_LIBRARIAN_PASS=${K6_LIBRARIAN_PASS:-librarian123}
      - K6_READER_USER=${K6_READER_USER:-reader}
      - K6_READER_PASS=${K6_READER_PASS:-reader123}
      - K6_ENVIRONMENT=${K6_ENVIRONMENT:-docker}
    networks:
      - gcrf-performance-network
      - gcrf-backend-network
    depends_on:
      influxdb:
        condition: service_healthy
    command: >
      run
      --out influxdb=http://influxdb:8086/k6
      --summary-export=/results/stress-test-summary.json
      /scripts/stress-test.js
    labels:
      com.gcrf.service: "k6-stress"
      com.gcrf.tier: "performance-testing"

  # ===========================================
  # k6 Spike Test Runner (one-shot)
  # ===========================================
  k6-spike:
    image: grafana/k6:0.49.0
    container_name: gcrf-k6-spike
    profiles:
      - spike-test
    volumes:
      - ./performance:/scripts:ro
      - k6-results:/results
    environment:
      - K6_BASE_URL=${K6_BASE_URL:-http://gateway:8080}
      - K6_ADMIN_USER=${K6_ADMIN_USER:-admin}
      - K6_ADMIN_PASS=${K6_ADMIN_PASS:-admin123}
      - K6_LIBRARIAN_USER=${K6_LIBRARIAN_USER:-librarian}
      - K6_LIBRARIAN_PASS=${K6_LIBRARIAN_PASS:-librarian123}
      - K6_READER_USER=${K6_READER_USER:-reader}
      - K6_READER_PASS=${K6_READER_PASS:-reader123}
      - K6_ENVIRONMENT=${K6_ENVIRONMENT:-docker}
    networks:
      - gcrf-performance-network
      - gcrf-backend-network
    depends_on:
      influxdb:
        condition: service_healthy
    command: >
      run
      --out influxdb=http://influxdb:8086/k6
      --summary-export=/results/spike-test-summary.json
      /scripts/spike-test.js
    labels:
      com.gcrf.service: "k6-spike"
      com.gcrf.tier: "performance-testing"

  # ===========================================
  # k6 Soak Test Runner (one-shot)
  # ===========================================
  k6-soak:
    image: grafana/k6:0.49.0
    container_name: gcrf-k6-soak
    profiles:
      - soak-test
    volumes:
      - ./performance:/scripts:ro
      - k6-results:/results
    environment:
      - K6_BASE_URL=${K6_BASE_URL:-http://gateway:8080}
      - K6_ADMIN_USER=${K6_ADMIN_USER:-admin}
      - K6_ADMIN_PASS=${K6_ADMIN_PASS:-admin123}
      - K6_LIBRARIAN_USER=${K6_LIBRARIAN_USER:-librarian}
      - K6_LIBRARIAN_PASS=${K6_LIBRARIAN_PASS:-librarian123}
      - K6_READER_USER=${K6_READER_USER:-reader}
      - K6_READER_PASS=${K6_READER_PASS:-reader123}
      - K6_ENVIRONMENT=${K6_ENVIRONMENT:-docker}
      - K6_SOAK_DURATION=${K6_SOAK_DURATION:-60}
    networks:
      - gcrf-performance-network
      - gcrf-backend-network
    depends_on:
      influxdb:
        condition: service_healthy
    command: >
      run
      --out influxdb=http://influxdb:8086/k6
      --summary-export=/results/soak-test-summary.json
      /scripts/soak-test.js
    labels:
      com.gcrf.service: "k6-soak"
      com.gcrf.tier: "performance-testing"

# ===========================================
# Grafana Data Source Configuration
# ===========================================
# To use this stack with Grafana, add the following datasource
# to your Grafana provisioning:
#
# apiVersion: 1
# datasources:
#   - name: k6-InfluxDB
#     type: influxdb
#     uid: k6-influxdb
#     access: proxy
#     url: http://gcrf-influxdb:8086
#     database: k6
#     isDefault: false
#     editable: true
