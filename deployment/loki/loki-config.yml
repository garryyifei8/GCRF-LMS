# GCRF Library Management System - Loki Configuration
# Log aggregation system for centralized logging
# Version: 1.0.0
# Last Updated: 2025-12-01
#
# Architecture:
#   - Development: Filesystem storage (local)
#   - Production: S3/MinIO storage (distributed)
#
# Documentation: https://grafana.com/docs/loki/latest/configuration/

# Authentication configuration (disabled for internal use)
auth_enabled: false

# Server configuration
server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: info
  # Graceful shutdown timeout
  graceful_shutdown_timeout: 30s
  # HTTP server settings
  http_server_read_timeout: 60s
  http_server_write_timeout: 60s

# Common configuration shared across all components
common:
  # Instance address for ring membership
  instance_addr: 127.0.0.1
  # Storage path for all components
  path_prefix: /loki
  # Storage configuration
  storage:
    # Development: Filesystem storage
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  # Replication factor (1 for standalone)
  replication_factor: 1
  # Ring configuration for single-node deployment
  ring:
    kvstore:
      store: inmemory

# Query range configuration
query_range:
  # Enable result caching
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        max_size_mb: 100
  # Align queries to 5m intervals for better caching
  align_queries_with_step: true
  # Maximum parallel queries per tenant
  parallelise_shardable_queries: true
  # Split queries by 24h intervals
  split_queries_by_interval: 24h

# Schema configuration - defines how logs are indexed and stored
schema_config:
  configs:
    # Current schema (v13 - latest recommended)
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

# Ingester configuration
ingester:
  # Write-ahead log configuration
  wal:
    enabled: true
    dir: /loki/wal
    # Flush interval for WAL
    flush_on_shutdown: true
  # Lifecycle configuration
  lifecycler:
    ring:
      kvstore:
        store: inmemory
      replication_factor: 1
    final_sleep: 0s
  # Chunk settings
  chunk_idle_period: 30m
  max_chunk_age: 1h
  chunk_target_size: 1572864  # 1.5MB
  chunk_retain_period: 30s
  # Flush settings
  max_transfer_retries: 0

# Compactor configuration - handles retention and compaction
compactor:
  working_directory: /loki/compactor
  shared_store: filesystem
  compaction_interval: 10m
  # Retention configuration
  retention_enabled: true
  retention_delete_delay: 2h
  retention_delete_worker_count: 150
  # Delete request settings
  delete_request_cancel_period: 24h

# Limits configuration - per-tenant limits
limits_config:
  # Retention period (30 days)
  retention_period: 720h
  # Ingestion limits
  ingestion_rate_mb: 10
  ingestion_burst_size_mb: 20
  max_line_size: 256kb
  max_line_size_truncate: true
  # Query limits
  max_entries_limit_per_query: 5000
  max_query_series: 500
  max_query_parallelism: 32
  max_query_length: 0  # Unlimited
  # Stream limits
  max_streams_per_user: 10000
  max_global_streams_per_user: 10000
  # Split and query settings
  split_queries_by_interval: 24h
  query_timeout: 5m
  # Cardinality limits
  max_label_name_length: 1024
  max_label_value_length: 2048
  max_label_names_per_series: 30
  # Reject old samples
  reject_old_samples: true
  reject_old_samples_max_age: 168h  # 7 days
  # Per-stream rate limit
  per_stream_rate_limit: 5MB
  per_stream_rate_limit_burst: 15MB

# Storage configuration
storage_config:
  # TSDB shipper configuration
  tsdb_shipper:
    active_index_directory: /loki/tsdb-index
    cache_location: /loki/tsdb-cache
    cache_ttl: 24h
  # Filesystem storage (development)
  filesystem:
    directory: /loki/chunks

# Chunk store configuration
chunk_store_config:
  # Maximum lookback for queries
  max_look_back_period: 720h  # 30 days

# Table manager configuration (for index table management)
table_manager:
  retention_deletes_enabled: true
  retention_period: 720h  # 30 days

# Ruler configuration (for alerting rules)
ruler:
  storage:
    type: local
    local:
      directory: /loki/rules
  # Rule path
  rule_path: /loki/rules-temp
  # Alert manager configuration (optional)
  alertmanager_url: ""
  ring:
    kvstore:
      store: inmemory
  enable_api: true

# Frontend configuration
frontend:
  # Log queries for debugging
  log_queries_longer_than: 5s
  # Compress responses
  compress_responses: true
  # Maximum outstanding requests
  max_outstanding_per_tenant: 2048

# Query scheduler configuration
query_scheduler:
  max_outstanding_requests_per_tenant: 2048

# Distributor configuration
distributor:
  ring:
    kvstore:
      store: inmemory

# Analytics configuration (disabled)
analytics:
  reporting_enabled: false

# Tracing configuration (optional - for distributed tracing)
# tracing:
#   enabled: false
