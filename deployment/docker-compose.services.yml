  #     VUE_APP_ENV: production
  #   depends_on:
  #     gcrf-gateway-service:
  #       condition: service_healthy
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:80/health"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3
  #     start_period: 30s
  #   networks:
  #     # Frontend network only - communicates via gateway
  #     - gcrf-frontend-network
