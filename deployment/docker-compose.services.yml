  #   labels:
  #     com.gcrf.service: "web-admin"
  #     com.gcrf.tier: "frontend"
  #     com.gcrf.version: "1.0.0"
  #     com.gcrf.component: "web-ui"

  # ============================================
  # Additional Microservices (Phase 3)
  # ============================================
  # Book Service, Reader Service, Circulation Service, etc.
  # Will be added as they are developed and containerized
  #
  # Example structure for future services:
  # gcrf-book-service:
  #   image: gcrf-library/book-service:latest
  #   container_name: gcrf-book-service
  #   restart: unless-stopped
  #   expose:
  #     - "8082"
  #   environment:
  #     SPRING_PROFILES_ACTIVE: prod
  #     # ... additional configuration
  #   depends_on:
  #     postgres-primary:
  #       condition: service_healthy
  #     redis-master:
  #       condition: service_healthy
  #     nacos:
  #       condition: service_healthy
  #   # ... rest of configuration

# ============================================
# Network Configuration
# ============================================
networks:
  # Backend network - connects to infrastructure network
  gcrf-backend-network:
    external: true
    name: gcrf-infrastructure-network

  # Frontend network - for web UI and gateway communication
  gcrf-frontend-network:
    driver: bridge
    name: gcrf-frontend-network
    internal: false  # Exposed to host for web access
    ipam:
      driver: default
      config:
        - subnet: 172.29.0.0/16
          gateway: 172.29.0.1

# ============================================
