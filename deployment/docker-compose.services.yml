      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400}
      LOGGING_LEVEL_ROOT: INFO
      LOGGING_LEVEL_COM_GCRF: ${LOGGING_LEVEL:-INFO}
    env_file:
      - ../.env
    volumes:
      - ./logs/gateway:/app/logs
      - ../backend/gateway-service/src/main/resources/application-prod.yml:/app/config/application.yml:ro
    depends_on:
      nacos:
        condition: service_healthy
      redis-master:
        condition: service_healthy
      gcrf-auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - gcrf-backend-network
      - gcrf-frontend-network
    deploy:
      resources:
