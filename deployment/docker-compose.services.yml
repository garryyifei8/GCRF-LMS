      - ../.env
    volumes:
      - ./logs/notification:/app/logs
    depends_on:
      postgres-primary:
        condition: service_healthy
      redis-master:
        condition: service_healthy
      nacos:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - gcrf-backend-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "com.gcrf.service,com.gcrf.tier"
    labels:
      com.gcrf.service: "notification"
      com.gcrf.tier: "backend"
      com.gcrf.version: "1.0.0"
      com.gcrf.component: "notification-service"

  # ============================================
  # Web Admin Frontend (3011 -> 80)
  # ============================================
  # Vue.js based administrative interface
  gcrf-web-admin:
    image: gcrf-library/web-admin:latest
    build:
      context: ../web-admin
      dockerfile: Dockerfile
    container_name: gcrf-web-admin
    restart: unless-stopped
    ports:
      - "3011:80"
    environment:
      VUE_APP_API_BASE_URL: http://gcrf-gateway-service:8080
      VUE_APP_ENV: production
    depends_on:
      gcrf-gateway-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - gcrf-frontend-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "com.gcrf.service,com.gcrf.tier"
    labels:
      com.gcrf.service: "web-admin"
      com.gcrf.tier: "frontend"
      com.gcrf.version: "1.0.0"
      com.gcrf.component: "web-ui"

# ============================================
# Network Configuration
# ============================================
networks:
  # Backend network - bridges to infrastructure network
  gcrf-backend-network:
    external: true
    name: gcrf-infrastructure-network

  # Frontend network - for web UI and gateway communication
  gcrf-frontend-network:
    driver: bridge
    name: gcrf-frontend-network
    internal: false
    ipam:
      driver: default
      config:
        - subnet: 172.29.0.0/16
          gateway: 172.29.0.1
