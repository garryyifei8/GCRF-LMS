          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "com.gcrf.service,com.gcrf.tier"
    labels:
      com.gcrf.service: "gateway"
      com.gcrf.tier: "backend"
      com.gcrf.version: "1.0.0"
      com.gcrf.component: "api-gateway"

