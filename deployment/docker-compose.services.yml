version: '3.8'

# ============================================
# GCRF Library Management System
# Application Services Orchestration
# ============================================
# This file orchestrates the microservices for the GCRF Library System
# including Gateway Service, Auth Service, and Web Admin (placeholder).
#
# Prerequisites:
#   - Infrastructure services must be running (docker-compose.infrastructure.yml)
#   - Service images must be built (Phase 3)
#   - Copy ../.env.prod.example to ../.env and set all values
#
# Usage:
#   docker-compose -f docker-compose.infrastructure.yml up -d
#   docker-compose -f docker-compose.services.yml up -d
# ============================================

services:
  # ============================================
  # API Gateway Service
  # ============================================
  # Central entry point for all API requests
  # Routes traffic to appropriate microservices
  gcrf-gateway-service:
    image: gcrf-library/gateway-service:latest
    container_name: gcrf-gateway-service
    restart: unless-stopped
    ports:
      # Expose gateway to host for external access
      - "8080:8080"
    environment:
      # Spring profile for production configuration
      SPRING_PROFILES_ACTIVE: prod
      # JVM settings for production
      JAVA_OPTS: >
        -Xms512m
        -Xmx1024m
        -XX:+UseG1GC
        -XX:MaxGCPauseMillis=100
        -XX:+ParallelRefProcEnabled
        -Djava.security.egd=file:/dev/./urandom
        -Dspring.config.location=/app/config/application.yml
      # Service discovery
      NACOS_SERVER_ADDR: nacos:8848
      NACOS_NAMESPACE: ${NACOS_NAMESPACE:-public}
      NACOS_USERNAME: ${NACOS_USERNAME}
      NACOS_PASSWORD: ${NACOS_PASSWORD}
      # Redis configuration
      REDIS_HOST: redis-master
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      # JWT configuration
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400}
      # Logging
      LOGGING_LEVEL_ROOT: INFO
      LOGGING_LEVEL_COM_GCRF: ${LOGGING_LEVEL:-INFO}
    env_file:
      - ../.env
    volumes:
      # Log volume for persistent logging
      - ./logs/gateway:/app/logs
      # Mount production configuration (read-only)
      - ../backend/gateway-service/src/main/resources/application-prod.yml:/app/config/application.yml:ro
    depends_on:
      nacos:
        condition: service_healthy
      redis-master:
        condition: service_healthy
      gcrf-auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      # Connect to both backend and frontend networks
      - gcrf-backend-network
      - gcrf-frontend-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "com.gcrf.service,com.gcrf.tier"
    labels:
      com.gcrf.service: "gateway"
      com.gcrf.tier: "backend"
      com.gcrf.version: "1.0.0"
      com.gcrf.component: "api-gateway"

  # ============================================
  # Authentication Service
  # ============================================
  # Handles user authentication and authorization
  # Manages JWT tokens and user sessions
  gcrf-auth-service:
    image: gcrf-library/auth-service:latest
    container_name: gcrf-auth-service
    restart: unless-stopped
    # No port exposure - internal service only
    expose:
      - "8081"
    environment:
      # Spring profile for production configuration
      SPRING_PROFILES_ACTIVE: prod
      # JVM settings for production
      JAVA_OPTS: >
        -Xms512m
        -Xmx1024m
        -XX:+UseG1GC
        -XX:MaxGCPauseMillis=100
        -XX:+ParallelRefProcEnabled
        -Djava.security.egd=file:/dev/./urandom
        -Dspring.config.location=/app/config/application.yml
      # Service discovery
      NACOS_SERVER_ADDR: nacos:8848
      NACOS_NAMESPACE: ${NACOS_NAMESPACE:-public}
      NACOS_USERNAME: ${NACOS_USERNAME}
      NACOS_PASSWORD: ${NACOS_PASSWORD}
      # Database configuration
      DB_HOST: postgres-primary
      DB_PORT: 5432
      DB_NAME: gcrf_auth
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      # Redis configuration
      REDIS_HOST: redis-master
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      # JWT configuration
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-604800}
      # Security settings
      BCRYPT_STRENGTH: ${BCRYPT_STRENGTH:-10}
      # Logging
      LOGGING_LEVEL_ROOT: INFO
      LOGGING_LEVEL_COM_GCRF: ${LOGGING_LEVEL:-INFO}
    env_file:
      - ../.env
    volumes:
      # Log volume for persistent logging
      - ./logs/auth:/app/logs
      # Mount production configuration (read-only)
      - ../backend/auth-service/src/main/resources/application-prod.yml:/app/config/application.yml:ro
    depends_on:
      postgres-primary:
        condition: service_healthy
      redis-master:
        condition: service_healthy
      nacos:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      # Backend network only - no direct external access
      - gcrf-backend-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "com.gcrf.service,com.gcrf.tier"
    labels:
      com.gcrf.service: "auth"
      com.gcrf.tier: "backend"
      com.gcrf.version: "1.0.0"
      com.gcrf.component: "authentication"

  # ============================================
  # Web Admin Frontend (Placeholder for Phase 3)
  # ============================================
  # Vue.js based administrative interface
  # Uncomment and configure when frontend image is ready
  #
  # gcrf-web-admin:
