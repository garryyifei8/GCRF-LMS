name: CI

on:
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web-admin/package-lock.json

      - run: cd web-admin && npm ci

      - name: ESLint
        run: cd web-admin && npm run lint

      - name: Prettier check
        run: cd web-admin && npx prettier --check "src/**/*.{vue,js,css,json}"

      - name: MSW Mock Coverage
        run: cd web-admin && npm run mock:check

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web-admin/package-lock.json

      - run: cd web-admin && npm ci

      - name: Run Vitest
        run: cd web-admin && npm run test:coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: web-admin/coverage/

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web-admin/package-lock.json

      - run: cd web-admin && npm ci
      - run: cd web-admin && npm run build

  build-backend:
    name: Build & Test Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Compile
        run: cd backend && mvn clean compile -DskipTests

      - name: Test
        run: cd backend && mvn test

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-reports
          path: backend/**/target/surefire-reports/

      - name: Upload JaCoCo reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-jacoco-reports
          path: backend/**/target/site/jacoco/
          retention-days: 14

  docker-build-smoke:
    name: Docker Build Smoke
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - gateway-service
          - auth-service
          - book-service
          - circulation-service
          - reader-service
          - system-service
          - notification-service
          - analytics-service
          - chat-service
          - recommend-service
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: backend/${{ matrix.service }}/Dockerfile
          push: false
          tags: gcrf-library/${{ matrix.service }}:ci
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
