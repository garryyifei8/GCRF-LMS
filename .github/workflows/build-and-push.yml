name: Build and Push Docker Images

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to build'
        required: false
        default: 'latest'

env:
  REGISTRY: harbor.gcrf.com
  JAVA_VERSION: '21'

jobs:
  build-and-test:
    name: Build and Test Services
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      - name: Extract version
        id: version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          elif [[ ${{ github.event_name }} == 'workflow_dispatch' ]]; then
            VERSION=${{ github.event.inputs.version }}
          else
            VERSION=${GITHUB_SHA::8}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Cache Docker layers
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build all services
        run: |
          cd deployment/scripts
          chmod +x build-all-services.sh
          ./build-all-services.sh \
            --version ${{ steps.version.outputs.version }} \
            --parallel 4 \
            --format html

      - name: Test images
        run: |
          cd deployment/scripts
          chmod +x test-images.sh
          ./test-images.sh \
            --version ${{ steps.version.outputs.version }} \
            --format html \
            --no-vuln-scan

      - name: Upload build reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-reports-${{ steps.version.outputs.version }}
          path: |
            deployment/reports/*.html
            deployment/logs/builds/*.log
          retention-days: 30

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports-${{ steps.version.outputs.version }}
          path: deployment/reports/test-report-*.html
          retention-days: 30

  push-to-registry:
    name: Push to Registry
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Extract version
        id: version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          elif [[ ${{ github.event_name }} == 'workflow_dispatch' ]]; then
            VERSION=${{ github.event.inputs.version }}
          else
            VERSION=${GITHUB_SHA::8}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Determine additional tags
        id: tags
        run: |
          TAGS=""
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            # For version tags, create semver tags
            VERSION=${{ steps.version.outputs.version }}
            if [[ $VERSION =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
              MAJOR="${BASH_REMATCH[1]}"
              MINOR="${BASH_REMATCH[2]}"
              TAGS="--tag v${MAJOR}.${MINOR} --tag v${MAJOR} --tag latest"
            fi
          elif [[ $GITHUB_REF == refs/heads/main ]]; then
            TAGS="--tag latest --tag stable"
          elif [[ $GITHUB_REF == refs/heads/develop ]]; then
            TAGS="--tag dev"
          fi
          echo "tags=$TAGS" >> $GITHUB_OUTPUT

      - name: Push images to Harbor
        run: |
          cd deployment/scripts
          chmod +x push-images.sh
          ./push-images.sh \
            --target-registry ${{ env.REGISTRY }} \
            --version ${{ steps.version.outputs.version }} \
            ${{ steps.tags.outputs.tags }} \
            --parallel \
            --max-retries 3

      - name: Create deployment summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version**: ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Registry**: ${{ env.REGISTRY }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Images Pushed" >> $GITHUB_STEP_SUMMARY
          echo "- gateway-service:${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- auth-service:${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- book-service:${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- circulation-service:${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- reader-service:${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- system-service:${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- notification-service:${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY

  vulnerability-scan:
    name: Vulnerability Scan
    needs: push-to-registry
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'

    steps:
      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Extract version
        id: version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION=${GITHUB_SHA::8}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/gateway-service:${{ steps.version.outputs.version }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
