version: '3.8'

# ============================================
# Library Management System - Infrastructure
# All-in-One Docker Compose Configuration
# ============================================

services:
  # ==================== MySQL Master-Slave ====================
  mysql-master:
    image: mysql:8.0
    container_name: library-mysql-master
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-library_root_2024}
      MYSQL_REPLICATION_USER: repl
      MYSQL_REPLICATION_PASSWORD: ${MYSQL_REPL_PASSWORD:-repl_password_2024}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
      - --server-id=1
      - --log-bin=mysql-bin
      - --binlog-format=ROW
      - --sync-binlog=1
      - --gtid-mode=ON
      - --enforce-gtid-consistency=ON
    ports:
      - "3306:3306"
    volumes:
      - ./mysql/master/data:/var/lib/mysql
      - ./mysql/master/logs:/var/log/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./mysql/master/conf/my.cnf:/etc/mysql/conf.d/my.cnf
    networks:
      - library-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-library_root_2024}"]
      interval: 10s
      timeout: 5s
      retries: 3

  mysql-slave:
    image: mysql:8.0
    container_name: library-mysql-slave
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-library_root_2024}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
      - --server-id=2
      - --relay-log=mysql-relay-bin
      - --log-bin=mysql-bin
      - --binlog-format=ROW
      - --read-only=1
      - --gtid-mode=ON
      - --enforce-gtid-consistency=ON
      - --skip-slave-start
    ports:
      - "3307:3306"
    volumes:
      - ./mysql/slave/data:/var/lib/mysql
      - ./mysql/slave/logs:/var/log/mysql
      - ./mysql/slave/conf/my.cnf:/etc/mysql/conf.d/my.cnf
    networks:
      - library-network
    depends_on:
      mysql-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-library_root_2024}"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ==================== Redis ====================
  redis:
    image: redis:7.0-alpine
    container_name: library-redis
    restart: always
    command: redis-server /usr/local/etc/redis/redis.conf
    environment:
      TZ: Asia/Shanghai
    ports:
      - "6379:6379"
    volumes:
      - ./redis/data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf
      - ./redis/logs:/var/log/redis
    networks:
      - library-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ==================== Elasticsearch ====================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: library-elasticsearch
    restart: always
    environment:
      - node.name=es-node-01
      - cluster.name=library-es-cluster
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
      - TZ=Asia/Shanghai
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - ./elasticsearch/data:/usr/share/elasticsearch/data
      - ./elasticsearch/plugins:/usr/share/elasticsearch/plugins
      - ./elasticsearch/config/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml
    networks:
      - library-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ==================== Kibana ====================
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: library-kibana
    restart: always
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - I18N_LOCALE=zh-CN
      - TZ=Asia/Shanghai
    ports:
      - "5601:5601"
    volumes:
      - ./elasticsearch/config/kibana.yml:/usr/share/kibana/config/kibana.yml
    networks:
      - library-network
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5601/api/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ==================== MinIO ====================
  minio:
    image: minio/minio:latest
    container_name: library-minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin2024}
      MINIO_BROWSER_REDIRECT_URL: http://localhost:9001
      TZ: Asia/Shanghai
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./minio/data:/data
      - ./minio/config:/root/.minio
    networks:
      - library-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ==================== RabbitMQ ====================
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: library-rabbitmq
    restart: always
    hostname: library-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-rabbitmq}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-rabbitmq2024}
      RABBITMQ_DEFAULT_VHOST: /library
      TZ: Asia/Shanghai
    ports:
      - "5672:5672"     # AMQP port
      - "15672:15672"   # Management UI port
    volumes:
      - ./rabbitmq/data:/var/lib/rabbitmq
      - ./rabbitmq/config/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf
      - ./rabbitmq/config/definitions.json:/etc/rabbitmq/definitions.json
    networks:
      - library-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

# ==================== Networks ====================
networks:
  library-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

# ==================== Volumes ====================
volumes:
  mysql-master-data:
  mysql-master-logs:
  mysql-slave-data:
  mysql-slave-logs:
  redis-data:
  redis-logs:
  es-data:
  es-plugins:
  minio-data:
  minio-config:
  rabbitmq-data:
