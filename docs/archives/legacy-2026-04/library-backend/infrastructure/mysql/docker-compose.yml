version: '3.8'

services:
  mysql-master:
    image: mysql:8.0
    container_name: library-mysql-master
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-library_root_2024}
      MYSQL_REPLICATION_USER: repl
      MYSQL_REPLICATION_PASSWORD: ${MYSQL_REPL_PASSWORD:-repl_password_2024}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
      - --server-id=1
      - --log-bin=mysql-bin
      - --binlog-format=ROW
      - --sync-binlog=1
      - --gtid-mode=ON
      - --enforce-gtid-consistency=ON
    ports:
      - "3306:3306"
    volumes:
      - ./master/data:/var/lib/mysql
      - ./master/logs:/var/log/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./master/conf:/etc/mysql/conf.d
    networks:
      - library-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-library_root_2024}"]
      interval: 10s
      timeout: 5s
      retries: 3

  mysql-slave:
    image: mysql:8.0
    container_name: library-mysql-slave
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-library_root_2024}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
      - --server-id=2
      - --relay-log=mysql-relay-bin
      - --log-bin=mysql-bin
      - --binlog-format=ROW
      - --read-only=1
      - --gtid-mode=ON
      - --enforce-gtid-consistency=ON
      - --skip-slave-start
    ports:
      - "3307:3306"
    volumes:
      - ./slave/data:/var/lib/mysql
      - ./slave/logs:/var/log/mysql
      - ./slave/conf:/etc/mysql/conf.d
    networks:
      - library-network
    depends_on:
      mysql-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-library_root_2024}"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  library-network:
    external: true

volumes:
  mysql-master-data:
  mysql-master-logs:
  mysql-slave-data:
  mysql-slave-logs:
