# ========================================
# Components
# ========================================
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT Bearer token authentication. Include the token in the Authorization header:
        ```
        Authorization: Bearer <your-jwt-token>
        ```

  parameters:
    UserIdPath:
      name: userId
      in: path
      required: true
      description: User ID
      schema:
        type: integer
        format: int64
        example: 1

  # ========================================
  # Request Schemas
  # ========================================
  schemas:
    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 50
          description: Username
          example: "admin"
        password:
          type: string
          format: password
          minLength: 6
          description: Password
          example: "admin123"

    LoginResponse:
      type: object
      properties:
        accessToken:
          type: string
          description: JWT access token
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxIiwibmFtZSI6ImFkbWluIiwidXNlclR5cGUiOiJBRE1JTiIsImlhdCI6MTY5ODc2NTQzMiwiZXhwIjoxNjk4NzcyNjMyfQ.xyz"
        tokenType:
          type: string
          description: Token type
          default: "Bearer"
          example: "Bearer"
        expiresIn:
          type: integer
          format: int64
          description: Token expiration time in seconds
          example: 7200
        userId:
          type: integer
          format: int64
          description: User ID
          example: 1
        username:
          type: string
          description: Username
          example: "admin"
        userType:
          type: string
          enum: [STUDENT, TEACHER, ADMIN]
          description: User type
          example: "ADMIN"

    UserInfoResponse:
      type: object
      properties:
        userId:
          type: integer
          format: int64
          example: 1
        username:
          type: string
          example: "admin"
        userType:
          type: string
          enum: [STUDENT, TEACHER, ADMIN]
          example: "ADMIN"
        status:
          type: string
          enum: [ACTIVE, INACTIVE, LOCKED]
          example: "ACTIVE"
        email:
          type: string
          format: email
          example: "admin@gcrf-library.com"
        phone:
          type: string
          example: "13800138000"
        createdAt:
          type: string
          format: date-time
          example: "2024-10-12T08:30:00"
        updatedAt:
          type: string
          format: date-time
          example: "2024-10-28T15:20:00"

    CreateUserRequest:
      type: object
      required:
        - username
        - password
        - userType
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 50
          example: "newuser"
        password:
          type: string
          format: password
          minLength: 8
          example: "password123"
        userType:
          type: string
          enum: [STUDENT, TEACHER, ADMIN]
          example: "STUDENT"
        email:
          type: string
          format: email
          example: "newuser@example.com"
        phone:
          type: string
          pattern: '^1[3-9]\d{9}$'
          example: "13800138000"

    UpdateUserRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        phone:
          type: string
          pattern: '^1[3-9]\d{9}$'
        status:
          type: string
          enum: [ACTIVE, INACTIVE, LOCKED]

    BookCreateRequest:
      type: object
      required:
        - isbn
        - title
        - author
        - publisher
        - totalQuantity
      properties:
        isbn:
          type: string
          pattern: '^(97[89])?\d{9}[\dX]$'
          description: ISBN-10 or ISBN-13
          example: "9787115551234"
        title:
          type: string
          maxLength: 500
          example: "Spring Boot实战"
        subtitle:
          type: string
          maxLength: 500
          example: "从入门到精通"
        author:
          type: string
          maxLength: 200
          example: "张三"
        translator:
          type: string
          maxLength: 200
          example: "李四"
        publisher:
          type: string
          maxLength: 200
          example: "人民邮电出版社"
        publishDate:
          type: string
          format: date
          example: "2023-06-01"
        edition:
          type: string
          maxLength: 50
          example: "第1版"
        pages:
          type: integer
          minimum: 1
          example: 520
        price:
          type: number
          format: decimal
          minimum: 0
          example: 89.00
        binding:
          type: string
          maxLength: 50
          example: "平装"
        language:
          type: string
          maxLength: 50
          default: "Chinese"
          example: "Chinese"
        classificationCode:
          type: string
          maxLength: 50
          example: "TP312"
        subjectKeywords:
          type: string
          maxLength: 500
          example: "Java, Spring Boot, 微服务"
        description:
          type: string
          maxLength: 2000
          example: "本书全面介绍Spring Boot框架的核心概念和实战技巧..."
        coverUrl:
          type: string
          format: uri
          maxLength: 500
          example: "https://cdn.gcrf-library.com/covers/book123.jpg"
        totalQuantity:
          type: integer
          minimum: 1
          example: 10
        availableQuantity:
          type: integer
          minimum: 0
          example: 8

    BookUpdateRequest:
      type: object
      properties:
        title:
          type: string
          maxLength: 500
        author:
          type: string
          maxLength: 200
        publisher:
          type: string
          maxLength: 200
        publishDate:
          type: string
          format: date
        price:
          type: number
          format: decimal
          minimum: 0
        description:
          type: string
          maxLength: 2000
        coverUrl:
          type: string
          format: uri
        totalQuantity:
          type: integer
          minimum: 0
        availableQuantity:
          type: integer
          minimum: 0
        status:
          type: string
          enum: [ACTIVE, INACTIVE]

    BookDetailVO:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        isbn:
          type: string
          example: "9787115551234"
        title:
          type: string
          example: "Spring Boot实战"
        subtitle:
          type: string
          example: "从入门到精通"
        author:
          type: string
          example: "张三"
        translator:
          type: string
          example: "李四"
        publisher:
          type: string
          example: "人民邮电出版社"
        publishDate:
          type: string
          format: date
          example: "2023-06-01"
        edition:
          type: string
          example: "第1版"
        pages:
          type: integer
          example: 520
        price:
          type: number
          format: decimal
          example: 89.00
        binding:
          type: string
          example: "平装"
        language:
          type: string
          example: "Chinese"
        classificationCode:
          type: string
          example: "TP312"
        subjectKeywords:
          type: string
          example: "Java, Spring Boot, 微服务"
        description:
          type: string
          example: "本书全面介绍Spring Boot框架的核心概念和实战技巧..."
        coverUrl:
          type: string
          format: uri
          example: "https://cdn.gcrf-library.com/covers/book123.jpg"
        totalQuantity:
          type: integer
          example: 10
        availableQuantity:
          type: integer
          example: 8
        status:
          type: string
          enum: [ACTIVE, INACTIVE]
          example: "ACTIVE"
        createdAt:
          type: string
          format: date-time
          example: "2024-10-12T08:30:00"
        updatedAt:
          type: string
          format: date-time
          example: "2024-10-28T15:20:00"

    ReaderCreateRequest:
      type: object
      required:
        - readerId
        - name
        - readerType
      properties:
        readerId:
          type: string
          maxLength: 50
          description: Reader card number (unique)
          example: "R202400001"
        name:
          type: string
          maxLength: 100
          example: "王小明"
        gender:
          type: string
          enum: [MALE, FEMALE, OTHER]
          example: "MALE"
        idCard:
          type: string
          pattern: '^[1-9]\d{5}(18|19|20)\d{2}((0[1-9])|(1[0-2]))(([0-2][1-9])|10|20|30|31)\d{3}[0-9Xx]$'
          example: "110101199001011234"
        phone:
          type: string
          pattern: '^1[3-9]\d{9}$'
          example: "13912345678"
        email:
          type: string
          format: email
          example: "wangxiaoming@example.com"
        readerType:
          type: string
          enum: [STUDENT, TEACHER, STAFF, PUBLIC]
          example: "STUDENT"
        department:
          type: string
          maxLength: 200
          example: "计算机科学与技术学院"
        majorOrPosition:
          type: string
          maxLength: 200
          example: "软件工程"
        depositAmount:
          type: integer
          minimum: 0
          description: Deposit amount in cents (分)
          example: 10000
        maxBorrowQuantity:
          type: integer
          minimum: 1
          maximum: 100
          example: 5
        remarks:
          type: string
          maxLength: 1000

    ReaderUpdateRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 100
        phone:
          type: string
          pattern: '^1[3-9]\d{9}$'
        email:
          type: string
          format: email
        department:
          type: string
          maxLength: 200
        majorOrPosition:
          type: string
          maxLength: 200
        maxBorrowQuantity:
          type: integer
          minimum: 1
          maximum: 100
        remarks:
          type: string
          maxLength: 1000

    ReaderDetailVO:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        readerId:
          type: string
          example: "R202400001"
        name:
          type: string
          example: "王小明"
        gender:
          type: string
          enum: [MALE, FEMALE, OTHER]
          example: "MALE"
        idCard:
          type: string
          example: "110101199001011234"
        phone:
          type: string
          example: "13912345678"
        email:
          type: string
          example: "wangxiaoming@example.com"
        readerType:
          type: string
          enum: [STUDENT, TEACHER, STAFF, PUBLIC]
          example: "STUDENT"
        department:
          type: string
          example: "计算机科学与技术学院"
        majorOrPosition:
          type: string
          example: "软件工程"
        cardStatus:
          type: string
          enum: [PENDING, ACTIVE, SUSPENDED, CANCELLED]
          example: "ACTIVE"
        depositAmount:
          type: integer
          example: 10000
        currentBorrowedCount:
          type: integer
          example: 3
        maxBorrowQuantity:
          type: integer
          example: 5
        totalBorrowedCount:
          type: integer
          example: 25
        overdueCount:
          type: integer
          example: 0
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    BorrowRequest:
      type: object
      required:
        - readerId
        - bookId
      properties:
        readerId:
          type: integer
          format: int64
          description: Reader ID
          example: 1
        bookId:
          type: integer
          format: int64
          description: Book ID
          example: 10

    CirculationRecord:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        readerId:
          type: integer
          format: int64
          example: 1
        bookId:
          type: integer
          format: int64
          example: 10
        borrowDate:
          type: string
          format: date-time
          example: "2024-10-28T14:30:00"
        dueDate:
          type: string
          format: date-time
          example: "2024-11-27T14:30:00"
        returnDate:
          type: string
          format: date-time
          nullable: true
          example: null
        renewCount:
          type: integer
          example: 0
        status:
          type: integer
          description: "0=Borrowed, 1=Returned, 2=Overdue"
          example: 0
        overdueDays:
          type: integer
          example: 0
        fine:
          type: integer
          description: Fine amount in cents (分)
          example: 0

    RoleCreateRequest:
      type: object
      required:
        - roleCode
        - roleName
      properties:
        roleCode:
          type: string
          maxLength: 50
          example: "LIBRARIAN"
        roleName:
          type: string
          maxLength: 100
          example: "图书管理员"
        description:
          type: string
          maxLength: 500
          example: "负责图书入库、借还等日常管理"
        sortOrder:
          type: integer
          example: 10

    RoleUpdateRequest:
      type: object
      properties:
        roleName:
          type: string
          maxLength: 100
        description:
          type: string
          maxLength: 500
        sortOrder:
          type: integer
        status:
          type: string
          enum: [ACTIVE, INACTIVE]

    RoleDetailVO:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        roleCode:
          type: string
          example: "LIBRARIAN"
        roleName:
          type: string
          example: "图书管理员"
        description:
          type: string
          example: "负责图书入库、借还等日常管理"
        status:
          type: string
          enum: [ACTIVE, INACTIVE]
          example: "ACTIVE"
        sortOrder:
          type: integer
          example: 10
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    PermissionVO:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        permissionCode:
          type: string
          example: "book:create"
        permissionName:
          type: string
          example: "创建图书"
        permissionType:
          type: string
          enum: [MENU, BUTTON, API]
          example: "API"
        resourcePath:
          type: string
          example: "/api/v1/books"
        description:
          type: string

    # ========================================
    # Response Wrappers
    # ========================================
    SuccessResponse:
      type: object
      properties:
        code:
          type: integer
          description: Response code (200 for success)
          example: 200
        message:
          type: string
          description: Response message
          example: "操作成功"
        data:
          description: Response data (varies by endpoint)
        timestamp:
          type: integer
          format: int64
          description: Unix timestamp in milliseconds
          example: 1698765432000
        traceId:
          type: string
          description: Request trace ID for debugging
          example: "trace-abc123xyz"

    ErrorResponse:
      type: object
      properties:
        code:
          type: integer
          description: Error code
          example: 400
        message:
          type: string
          description: Error message
          example: "参数验证失败"
        data:
          nullable: true
        timestamp:
          type: integer
          format: int64
          example: 1698765432000
        traceId:
          type: string
          example: "trace-abc123xyz"

    PageResult:
      type: object
      properties:
        records:
          type: array
          items: {}
          description: List of records
        total:
          type: integer
          format: int64
          description: Total number of records
          example: 100
        pageNum:
          type: integer
          description: Current page number (1-based)
          example: 1
        pageSize:
          type: integer
          description: Page size
          example: 10
        pages:
          type: integer
          description: Total number of pages
          example: 10

    PagedBookResponse:
      allOf:
        - $ref: '#/components/schemas/PageResult'
        - type: object
          properties:
            records:
              type: array
              items:
                $ref: '#/components/schemas/BookDetailVO'

    PagedReaderResponse:
      allOf:
        - $ref: '#/components/schemas/PageResult'
        - type: object
          properties:
            records:
              type: array
              items:
                $ref: '#/components/schemas/ReaderDetailVO'

    PagedRoleResponse:
      allOf:
        - $ref: '#/components/schemas/PageResult'
        - type: object
          properties:
            records:
              type: array
              items:
                $ref: '#/components/schemas/RoleDetailVO'

    PagedUserInfoResponse:
      type: object
      description: MyBatis-Plus IPage wrapper
      properties:
        records:
          type: array
          items:
            $ref: '#/components/schemas/UserInfoResponse'
        total:
          type: integer
          format: int64
          example: 100
        size:
          type: integer
          example: 10
        current:
          type: integer
          example: 1
        pages:
          type: integer
          example: 10

  # ========================================
  # Common Responses
  # ========================================
  responses:
    UnauthorizedError:
      description: Authentication required or token invalid/expired
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            missingToken:
              summary: Missing token
              value:
                code: 401
                message: "未提供认证令牌"
                data: null
                timestamp: 1698765432000
            invalidToken:
              summary: Invalid token
              value:
                code: 401
