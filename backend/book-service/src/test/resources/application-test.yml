spring:
  # Datasource is dynamically configured by BaseIntegrationTest via @DynamicPropertySource

  # Flyway: url/user/password are overridden by BaseIntegrationTest @DynamicPropertySource
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # Use simple (in-memory, no-op) cache in tests — Redis not available
  cache:
    type: none

  # Redis: disable auto-connect so missing Redis doesn't fail context startup
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

  data:
    elasticsearch:
      repositories:
        enabled: false

  elasticsearch:
    uris: http://localhost:9200

  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false

# MinIO placeholder (tests either mock FileStorageService or don't exercise MinIO)
minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket-covers: library-covers
  bucket-pdfs: library-pdfs
  max-cover-size: 5242880
  max-pdf-size: 52428800

logging:
  level:
    com.gcrf.library: DEBUG
    org.springframework: INFO
