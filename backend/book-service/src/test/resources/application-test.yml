spring:
  # Datasource is dynamically configured by BaseIntegrationTest via @DynamicPropertySource

  # Redis配置
  redis:
    host: localhost
    port: 6379
    password: gcrf_redis_2024
    database: 2  # Different from production

  data:
    redis:
      host: localhost
      port: 6379
    elasticsearch:
      repositories:
        enabled: false

  elasticsearch:
    uris: http://localhost:9200

  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false

# MinIO placeholder (tests either mock FileStorageService or don't exercise MinIO)
