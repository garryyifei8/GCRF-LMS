server:
  port: 8082

spring:
  application:
    name: book-service

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/book_service
    username: postgres
    password: gcrf_secure_2024

  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
        username: nacos
        password: nacos
        group: LIBRARY_GROUP

  redis:
    host: localhost
    port: 6379

  elasticsearch:
    uris: http://localhost:9200

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*Mapper.xml
  type-aliases-package: com.gcrf.library.book.entity

# 禁用业务服务CORS配置，由Gateway统一处理CORS
library:
  web:
    cors:
      enabled: false

logging:
  level:
    com.gcrf.library: debug

# Actuator配置 - 健康检查与监控
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}
      service: book-service
  health:
    defaults:
      enabled: true
