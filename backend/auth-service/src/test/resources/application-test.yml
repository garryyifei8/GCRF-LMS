spring:
  # Datasource/Flyway URLs are injected via BaseIntegrationTest @DynamicPropertySource (Testcontainers).
  # Keeping driver hint here so plain @SpringBootTest contexts without container still fail fast.
  datasource:
    driver-class-name: org.postgresql.Driver
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      initial-size: 1
      min-idle: 1
      max-active: 5

  # Redis配置 (Redisson)
  redis:
    host: localhost
    port: 6379
    password: gcrf_redis_2024
    database: 1

  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false

# JWT配置
jwt:
  secret: test-secret-key-for-unit-tests-only-do-not-use-in-production-minimum-256-bits
  expiration: 7200000 # 2小时(毫秒)

logging:
  level:
    com.gcrf.library: DEBUG
    org.springframework.security: DEBUG
