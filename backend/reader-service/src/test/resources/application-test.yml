spring:
  # Datasource is dynamically configured by BaseIntegrationTest via @DynamicPropertySource
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      initial-size: 1
      min-idle: 1
      max-active: 5

  # Flyway migrations are automatically executed for schema initialization
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # Redis配置
  redis:
    host: localhost
    port: 6379
    password: gcrf_redis_2024
    database: 3  # Different from production (using database 3 for reader-service test)

  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false

logging:
  level:
    com.gcrf.library: DEBUG
    org.springframework: INFO
