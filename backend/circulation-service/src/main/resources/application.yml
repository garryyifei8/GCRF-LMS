server:
  port: 8083

spring:
  application:
    name: circulation-service

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/circulation_service
    username: postgres
    password: gcrf_secure_2024

  sql:
    init:
      mode: always
      platform: postgresql

  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
        username: nacos
        password: nacos
        group: LIBRARY_GROUP

  redis:
    host: localhost
    port: 6379

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*Mapper.xml
  type-aliases-package: com.gcrf.library.circulation.entity

# 禁用业务服务CORS配置，由Gateway统一处理CORS
library:
  web:
    cors:
      enabled: false

logging:
  level:
    com.gcrf.library: debug

# Actuator配置 - 健康检查与监控
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}
      service: circulation-service
  health:
    defaults:
      enabled: true
