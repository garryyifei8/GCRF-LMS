server:
  port: 8080

spring:
  application:
    name: gateway-service
  main:
    web-application-type: reactive
    allow-bean-definition-overriding: true

  # Redis配置（用于限流和Token黑名单）
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:gcrf_redis_2024}
      database: 0

  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
        username: nacos
        password: nacos

    gateway:
      # 启用服务发现路由
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

      # 路由规则配置
      routes:
        # 认证服务路由
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/v1/auth/**
          # 不使用StripPrefix，保留完整路径 /api/v1/auth/**

        # 图书服务路由
        - id: book-service
          uri: lb://book-service
          predicates:
            - Path=/api/v1/books/**
          # 不使用StripPrefix，保留完整路径 /api/v1/books/**

        # 读者服务路由
        - id: reader-service
          uri: lb://reader-service
          predicates:
            - Path=/api/v1/readers/**
          # 不使用StripPrefix，保留完整路径 /api/v1/readers/**

        # 推荐服务路由
        - id: recommend-service
          uri: lb://recommend-service
          predicates:
            - Path=/api/v1/recommend/**
          # 不使用StripPrefix，保留完整路径 /api/v1/recommend/**

        # 智能问答服务路由
        - id: chat-service
          uri: lb://chat-service
          predicates:
            - Path=/api/v1/chat/**
          # 不使用StripPrefix，保留完整路径 /api/v1/chat/**

        # 流通服务 - 借阅管理（前端实际调用路径）
        - id: circulation-borrows
          uri: lb://circulation-service
          predicates:
            - Path=/api/v1/borrows/**

        # 流通服务 - 预约管理
        - id: circulation-reserves
          uri: lb://circulation-service
          predicates:
            - Path=/api/v1/reserves/**

        # 流通服务 - 罚款管理
        - id: circulation-fines
          uri: lb://circulation-service
          predicates:
            - Path=/api/v1/fines/**

        # 系统管理服务
        - id: system-service
          uri: lb://system-service
          predicates:
            - Path=/api/v1/system/**

        # 统计分析服务
        - id: analytics-service
          uri: lb://analytics-service
          predicates:
            - Path=/api/v1/analytics/**

        # 库存管理（在 book-service 下）
        - id: book-inventory
          uri: lb://book-service
          predicates:
            - Path=/api/v1/inventory/**

      # 全局CORS配置（由CorsConfig类处理，此处禁用以避免冲突）
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowed-methods: "*"
            allowed-headers: "*"
            allow-credentials: false

# Gateway白名单配置
gateway:
  whitelist:
    paths:
      - /api/v1/auth/login
      - /api/v1/auth/register
      - /api/v1/auth/health
      - /api/v1/chat/**
      - /actuator/**
      - /doc.html
      - /swagger-ui.html
      - /swagger-ui/**
      - /swagger-resources/**
      - /v3/api-docs/**
      - /webjars/**

# JWT配置（必须与Auth Service保持一致）
jwt:
  secret: GCRF_Library_System_Secret_2024_Secure
  expiration: 86400000

logging:
  level:
    org.springframework.cloud.gateway: debug
    com.gcrf.gateway: debug

# Actuator配置 - 健康检查与监控
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}
      service: gateway-service
  health:
    defaults:
      enabled: true

# Knife4j配置
knife4j:
  gateway:
    enabled: true
    # 聚合各个微服务的API文档
    routes:
      - name: 认证服务
        service-name: auth-service
        url: /v3/api-docs/auth-service
        order: 1
      - name: 图书服务
        service-name: book-service
        url: /v3/api-docs/book-service
        order: 2
      - name: 读者服务
        service-name: reader-service
        url: /v3/api-docs/reader-service
        order: 3
      - name: 流通服务
        service-name: circulation-service
        url: /v3/api-docs/circulation-service
        order: 4
      - name: 推荐服务
        service-name: recommend-service
        url: /v3/api-docs/recommend-service
        order: 5
      - name: 智能问答服务
        service-name: chat-service
        url: /v3/api-docs/chat-service
        order: 6

# SpringDoc配置
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

# ===========================================
# 安全加固配置
# ===========================================

# API限流配置
gateway:
  rate-limit:
    enabled: true
    # 默认匿名用户限流（每分钟）
    anonymous-requests-per-minute: 100
    # 默认认证用户限流（每分钟）
    authenticated-requests-per-minute: 1000
    # Redis键前缀
    redis-key-prefix: "gateway:ratelimit:"
    # 限流窗口大小（秒）
    window-size-seconds: 60
    # 路径特定限流规则
    paths:
      # 登录接口 - 防止暴力破解
      "/api/v1/auth/login":
        requests-per-minute: 10
        type: IP
        enabled: true
      # 注册接口 - 防止批量注册
      "/api/v1/auth/register":
        requests-per-minute: 5
        type: IP
        enabled: true
      # Token刷新 - 防止滥用
      "/api/v1/auth/refresh":
        requests-per-minute: 30
        type: USER
        enabled: true

  # CORS配置
  cors:
    enabled: true
    allowed-origins:
      - http://localhost:3011
      - http://localhost:5173
      - http://127.0.0.1:3011
      - http://127.0.0.1:5173
      # 生产环境添加实际域名
      # - https://library.gcrf.com
    allowed-methods:
      - GET
      - POST
      - PUT
      - DELETE
      - PATCH
      - OPTIONS
    allowed-headers:
      - Authorization
      - Content-Type
      - Accept
      - Origin
      - X-Requested-With
      - X-User-Id
      - X-Username
      - X-Trace-Id
    exposed-headers:
      - X-RateLimit-Remaining
      - X-RateLimit-Limit
      - X-RateLimit-Reset
      - X-Request-Id
      - X-Trace-Id
    allow-credentials: true
    max-age: 3600

  # 安全响应头配置
  security:
    headers:
      enabled: true
      # X-Frame-Options - 防止点击劫持
      x-frame-options: DENY
      # X-Content-Type-Options - 防止MIME嗅探
      x-content-type-options: nosniff
      # X-XSS-Protection - 兼容性XSS保护
      x-xss-protection: "1; mode=block"
      # Referrer-Policy - 控制Referrer发送
      referrer-policy: strict-origin-when-cross-origin
      # Cache-Control - 防止敏感数据缓存
      cache-control: "no-store, no-cache, must-revalidate, proxy-revalidate"
      # Content-Security-Policy配置
      content-security-policy:
        enabled: true
        default-src: "'self'"
        script-src: "'self' 'unsafe-inline' 'unsafe-eval'"
        style-src: "'self' 'unsafe-inline'"
        img-src: "'self' data: https:"
        font-src: "'self' data:"
        connect-src: "'self'"
        frame-src: "'none'"
        object-src: "'none'"
        base-uri: "'self'"
        form-action: "'self'"
        upgrade-insecure-requests: true
        block-all-mixed-content: true
      # Strict-Transport-Security配置 (HSTS)
      strict-transport-security:
        enabled: true
        max-age-seconds: 31536000
        include-sub-domains: true
        preload: false
      # Permissions-Policy配置
      permissions-policy:
        enabled: true
        camera: "()"
        microphone: "()"
        geolocation: "()"
        payment: "()"
        usb: "()"
        fullscreen: "(self)"
