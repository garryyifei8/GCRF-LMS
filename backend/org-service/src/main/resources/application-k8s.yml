spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgresql.edu-infra.svc.cluster.local}:${DB_PORT:5432}/${DB_NAME:gcrf_main}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD}

  data:
    redis:
      host: ${REDIS_HOST:redis.edu-infra.svc.cluster.local}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DB:0}
      password: ${REDIS_PASSWORD}

  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:nacos.edu-infra.svc.cluster.local:8848}
        namespace: ${NACOS_NAMESPACE:}
        group: ${NACOS_GROUP:DEFAULT_GROUP}

logging:
  level:
    com.gcrf.library: INFO
    org.flywaydb: INFO
