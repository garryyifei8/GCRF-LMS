spring:
  application:
    name: system-service-test

  # Datasource is dynamically configured by BaseIntegrationTest via @DynamicPropertySource
  datasource:
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 30000

  redis:
    host: localhost
    port: 6379
    database: 6
    timeout: 3000

  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deletedAt
      logic-delete-value: now()
      logic-not-delete-value: "null"

logging:
  level:
    com.gcrf.library.system: DEBUG
    org.springframework: WARN
