version: '3.8'

services:
  # Elasticsearch单节点（开发环境）
  elasticsearch-node1:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: gcrf-elasticsearch-node1
    hostname: elasticsearch-node1
    environment:
      - node.name=elasticsearch-node1
      - cluster.name=gcrf-es-cluster
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - es-node1-data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
      - "9300:9300"
    networks:
      - gcrf-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # Kibana Web界面
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: gcrf-kibana
    hostname: kibana
    environment:
      - SERVERNAME=kibana
      - ELASTICSEARCH_HOSTS=http://elasticsearch-node1:9200
      - I18N_LOCALE=zh-CN
      - XPACK_SECURITY_ENABLED=false
    ports:
      - "5601:5601"
    networks:
      - gcrf-network
    depends_on:
      elasticsearch-node1:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5601/api/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

networks:
  gcrf-network:
    external: true
    name: gcrf-network

volumes:
  es-node1-data:
    driver: local
    name: gcrf-es-node1-data
