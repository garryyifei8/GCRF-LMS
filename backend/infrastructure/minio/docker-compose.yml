version: '3.8'

services:
  # MinIO对象存储服务
  minio:
    image: minio/minio:latest
    container_name: gcrf-minio
    hostname: minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=gcrf_minio_2024
      - MINIO_BROWSER=on
      - MINIO_DOMAIN=minio
    ports:
      - "9000:9000"   # API端口
      - "9001:9001"   # Console管理界面
    volumes:
      - minio-data:/data
    networks:
      - gcrf-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped

  # MinIO初始化容器（创建bucket）
  minio-init:
    image: minio/mc:latest
    container_name: gcrf-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 minioadmin gcrf_minio_2024;
      /usr/bin/mc mb myminio/avatars --ignore-existing;
      /usr/bin/mc mb myminio/covers --ignore-existing;
      /usr/bin/mc mb myminio/documents --ignore-existing;
      /usr/bin/mc mb myminio/backups --ignore-existing;
      /usr/bin/mc anonymous set download myminio/covers;
      /usr/bin/mc anonymous set download myminio/avatars;
      echo 'MinIO bucket initialization completed successfully.';
      "
    networks:
      - gcrf-network

networks:
  gcrf-network:
    external: true
    name: gcrf-network

volumes:
  minio-data:
    driver: local
    name: gcrf-minio-data
