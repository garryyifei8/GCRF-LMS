scope: gcrf-cluster
namespace: /gcrf
name: patroni1

restapi:
  listen: 0.0.0.0:8008
  connect_address: patroni:8008
  authentication:
    username: admin
    password: admin_secure_2024

etcd:
  hosts:
    - etcd:2379

bootstrap:
  dcs:
    ttl: 30
    loop_wait: 10
    retry_timeout: 10
    maximum_lag_on_failover: 1048576
    postgresql:
      use_pg_rewind: true
      use_slots: true
      parameters:
        max_connections: 200
        shared_buffers: 256MB
        effective_cache_size: 1GB
        maintenance_work_mem: 64MB
        checkpoint_completion_target: 0.9
        wal_buffers: 16MB
        default_statistics_target: 100
        random_page_cost: 1.1
        effective_io_concurrency: 200
        work_mem: 4MB
        min_wal_size: 1GB
        max_wal_size: 4GB
        max_worker_processes: 8
        max_parallel_workers_per_gather: 2
        max_parallel_workers: 8
        max_parallel_maintenance_workers: 2
        hot_standby: on
        wal_level: replica
        max_wal_senders: 10
        max_replication_slots: 10
        hot_standby_feedback: on

  initdb:
    - encoding: UTF8
    - locale: C
    - data-checksums

  pg_hba:
    - host replication replicator 0.0.0.0/0 scram-sha-256
    - host all all 0.0.0.0/0 scram-sha-256

  users:
    admin:
      password: admin_secure_2024
      options:
        - createrole
        - createdb
    replicator:
      password: repl_secure_2024
      options:
        - replication

postgresql:
  listen: 0.0.0.0:5432
  connect_address: patroni:5432
  data_dir: /var/lib/postgresql/data
  pgpass: /tmp/pgpass
  authentication:
    replication:
      username: replicator
      password: repl_secure_2024
    superuser:
      username: postgres
      password: gcrf_secure_2024
    rewind:
      username: replicator
      password: repl_secure_2024
  parameters:
    unix_socket_directories: '/var/run/postgresql'

tags:
  nofailover: false
  noloadbalance: false
  clonefrom: false
  nosync: false
