;; ====================================================================
;; PgBouncer 配置文件
;; 用途: 配置PostgreSQL连接池
;; ====================================================================

[databases]
;; 数据库别名配置
;; 格式: dbname = host=hostname port=port dbname=database
postgres = host=postgres-primary port=5432 dbname=postgres
auth_service = host=postgres-primary port=5432 dbname=auth_service
book_service = host=postgres-primary port=5432 dbname=book_service
reader_service = host=postgres-primary port=5432 dbname=reader_service
circulation_service = host=postgres-primary port=5432 dbname=circulation_service
system_service = host=postgres-primary port=5432 dbname=system_service
recommend_service = host=postgres-primary port=5432 dbname=recommend_service
nlp_service = host=postgres-primary port=5432 dbname=nlp_service
vision_service = host=postgres-primary port=5432 dbname=vision_service
analytics_service = host=postgres-primary port=5432 dbname=analytics_service
notification_service = host=postgres-primary port=5432 dbname=notification_service
file_service = host=postgres-primary port=5432 dbname=file_service
search_service = host=postgres-primary port=5432 dbname=search_service

;; 读取从库配置（负载均衡）
;; auth_service_read = host=postgres-replica1,postgres-replica2 port=5432 dbname=auth_service

[pgbouncer]
;; ----------------------------------------------------------------
;; 基础配置
;; ----------------------------------------------------------------
listen_addr = 0.0.0.0
listen_port = 5432
unix_socket_dir =
user = postgres

;; ----------------------------------------------------------------
;; 认证配置
;; ----------------------------------------------------------------
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt
auth_user = postgres
auth_query = SELECT usename, passwd FROM pg_shadow WHERE usename=$1

;; ----------------------------------------------------------------
;; 连接池模式
;; ----------------------------------------------------------------
;; session: 会话级连接池（连接保持到会话结束）
;; transaction: 事务级连接池（推荐，性能最佳）
;; statement: 语句级连接池（不支持事务）
pool_mode = transaction

;; ----------------------------------------------------------------
;; 连接池大小配置
;; ----------------------------------------------------------------
;; 最大客户端连接数
max_client_conn = 1000

;; 默认连接池大小（每个数据库）
default_pool_size = 25

;; 最小连接池大小
min_pool_size = 10

;; 预留连接池大小
reserve_pool_size = 5

;; 预留连接池超时（秒）
reserve_pool_timeout = 3

;; 最大数据库连接数
max_db_connections = 200

;; 每个用户的最大连接数（0表示不限制）
max_user_connections = 100

;; ----------------------------------------------------------------
;; 超时配置
;; ----------------------------------------------------------------
;; 服务器空闲超时（秒）
server_idle_timeout = 600

;; 服务器生命周期（秒，0表示不限制）
server_lifetime = 3600

;; 服务器连接超时（秒）
server_connect_timeout = 30

;; 查询超时（秒，0表示不限制）
query_timeout = 0

;; 查询等待超时（秒）
query_wait_timeout = 120

;; 客户端空闲超时（秒，0表示不限制）
client_idle_timeout = 0

;; 客户端登录超时（秒）
client_login_timeout = 60

;; ----------------------------------------------------------------
;; 日志配置
;; ----------------------------------------------------------------
;; 日志连接
log_connections = 1

;; 日志断开连接
log_disconnections = 1

;; 日志连接池状态
log_pooler_errors = 1

;; 详细日志级别（0=quiet, 1=normal, 2=verbose）
verbose = 0

;; ----------------------------------------------------------------
;; 管理配置
;; ----------------------------------------------------------------
;; 管理员用户（可以访问管理控制台）
admin_users = postgres

;; 统计用户（可以查看统计信息）
stats_users = postgres

;; ----------------------------------------------------------------
;; 性能优化
;; ----------------------------------------------------------------
;; 忽略启动参数（提高兼容性）
ignore_startup_parameters = extra_float_digits,options

;; 应用名称追加
;; application_name_add_host = 1

;; 服务器检查查询
server_check_query = SELECT 1

;; 服务器检查延迟（秒）
server_check_delay = 30

;; 服务器快速关闭
server_fast_close = 0

;; ----------------------------------------------------------------
;; 安全配置
;; ----------------------------------------------------------------
;; 禁用Pipelining（提高安全性）
disable_pqexec = 0

;; ----------------------------------------------------------------
;; 高级配置
;; ----------------------------------------------------------------
;; DNS最大TTL（秒）
dns_max_ttl = 15

;; DNS缓存区域TTL（秒）
dns_zone_check_period = 0

;; 统计周期（秒）
stats_period = 60

;; ----------------------------------------------------------------
;; 监控配置
;; ----------------------------------------------------------------
;; 启用在线重启
so_reuseport = 1

;; TCP keepalive
tcp_keepalive = 1
tcp_keepcnt = 5
tcp_keepidle = 60
tcp_keepintvl = 10

;; TCP用户超时
tcp_user_timeout = 0
