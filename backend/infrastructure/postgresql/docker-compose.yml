version: '3.8'

services:
  # PostgreSQL 主库
  postgres-primary:
    image: postgres:15-alpine
    container_name: gcrf-postgres-primary
    hostname: postgres-primary
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gcrf_secure_2024}
      POSTGRES_DB: postgres
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=C"
      # 配置流复制
      POSTGRES_REPLICATION_USER: ${REPLICATION_USER:-replicator}
      POSTGRES_REPLICATION_PASSWORD: ${REPLICATION_PASSWORD:-repl_secure_2024}
    ports:
      - "5432:5432"
    volumes:
      - postgres-primary-data:/var/lib/postgresql/data
      - ./postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init-db.sql:ro
      - ./init-replication.sh:/docker-entrypoint-initdb.d/02-init-replication.sh:ro
      - ./backup:/backup
    command: >
      postgres
      -c config_file=/etc/postgresql/postgresql.conf
      -c hba_file=/etc/postgresql/pg_hba.conf
    networks:
      - gcrf-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # PostgreSQL 从库1
  postgres-replica1:
    image: postgres:15-alpine
    container_name: gcrf-postgres-replica1
    hostname: postgres-replica1
    user: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gcrf_secure_2024}
      PGUSER: ${POSTGRES_USER:-postgres}
      PGPASSWORD: ${POSTGRES_PASSWORD:-gcrf_secure_2024}
    ports:
      - "5433:5432"
    volumes:
      - postgres-replica1-data:/var/lib/postgresql/data
      - ./postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./setup-replica.sh:/docker-entrypoint-initdb.d/setup-replica.sh:ro
    command: >
      bash -c "
      if [ ! -f /var/lib/postgresql/data/PG_VERSION ]; then
        until pg_isready -h postgres-primary -p 5432 -U postgres; do
          echo 'Waiting for primary to be ready...';
          sleep 2;
        done;
        echo 'Primary is ready, setting up replication...';
        rm -rf /var/lib/postgresql/data/*;
        PGPASSWORD=repl_secure_2024 pg_basebackup -h postgres-primary -D /var/lib/postgresql/data -U replicator -v -P -W -R;
        chmod 700 /var/lib/postgresql/data;
        echo 'Replication setup complete';
      fi;
      exec postgres -c config_file=/etc/postgresql/postgresql.conf
      "
    depends_on:
      postgres-primary:
        condition: service_healthy
    networks:
      - gcrf-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # PostgreSQL 从库2
  postgres-replica2:
    image: postgres:15-alpine
    container_name: gcrf-postgres-replica2
    hostname: postgres-replica2
    user: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gcrf_secure_2024}
      PGUSER: ${POSTGRES_USER:-postgres}
      PGPASSWORD: ${POSTGRES_PASSWORD:-gcrf_secure_2024}
    ports:
      - "5434:5432"
    volumes:
      - postgres-replica2-data:/var/lib/postgresql/data
      - ./postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./setup-replica.sh:/docker-entrypoint-initdb.d/setup-replica.sh:ro
    command: >
      bash -c "
      if [ ! -f /var/lib/postgresql/data/PG_VERSION ]; then
        until pg_isready -h postgres-primary -p 5432 -U postgres; do
          echo 'Waiting for primary to be ready...';
          sleep 2;
        done;
        echo 'Primary is ready, setting up replication...';
        rm -rf /var/lib/postgresql/data/*;
        PGPASSWORD=repl_secure_2024 pg_basebackup -h postgres-primary -D /var/lib/postgresql/data -U replicator -v -P -W -R;
        chmod 700 /var/lib/postgresql/data;
        echo 'Replication setup complete';
      fi;
      exec postgres -c config_file=/etc/postgresql/postgresql.conf
      "
    depends_on:
      postgres-primary:
        condition: service_healthy
    networks:
      - gcrf-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # PgBouncer 连接池
  pgbouncer:
    image: pgbouncer/pgbouncer:1.21.0
    container_name: gcrf-pgbouncer
    hostname: pgbouncer
    environment:
      DATABASE_URL: "postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-gcrf_secure_2024}@postgres-primary:5432/postgres"
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 1000
      DEFAULT_POOL_SIZE: 25
      MIN_POOL_SIZE: 10
      RESERVE_POOL_SIZE: 5
      RESERVE_POOL_TIMEOUT: 3
      MAX_DB_CONNECTIONS: 200
      SERVER_IDLE_TIMEOUT: 600
      SERVER_LIFETIME: 3600
      SERVER_CONNECT_TIMEOUT: 30
      QUERY_TIMEOUT: 0
      CLIENT_IDLE_TIMEOUT: 0
      ADMIN_USERS: ${POSTGRES_USER:-postgres}
      STATS_USERS: ${POSTGRES_USER:-postgres}
    ports:
      - "6432:5432"
    volumes:
      - ./pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./userlist.txt:/etc/pgbouncer/userlist.txt:ro
    depends_on:
      postgres-primary:
        condition: service_healthy
    networks:
      - gcrf-network
    healthcheck:
      test: ["CMD-SHELL", "psql -h localhost -p 5432 -U ${POSTGRES_USER:-postgres} -d pgbouncer -c 'SHOW POOLS;' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Patroni 高可用管理（可选，用于自动故障转移）
  patroni:
    image: patroni/patroni:3.2.2
    container_name: gcrf-patroni
    hostname: patroni
    environment:
      PATRONI_NAME: patroni1
      PATRONI_NAMESPACE: /gcrf
      PATRONI_SCOPE: gcrf-cluster
      PATRONI_POSTGRESQL_DATA_DIR: /var/lib/postgresql/data
      PATRONI_POSTGRESQL_PGPASS: /tmp/pgpass
      PATRONI_POSTGRESQL_LISTEN: 0.0.0.0:5432
      PATRONI_POSTGRESQL_CONNECT_ADDRESS: patroni:5432
      PATRONI_RESTAPI_LISTEN: 0.0.0.0:8008
      PATRONI_RESTAPI_CONNECT_ADDRESS: patroni:8008
      PATRONI_admin_PASSWORD: ${PATRONI_ADMIN_PASSWORD:-admin_secure_2024}
      PATRONI_POSTGRESQL_AUTHENTICATION_SUPERUSER_USERNAME: ${POSTGRES_USER:-postgres}
      PATRONI_POSTGRESQL_AUTHENTICATION_SUPERUSER_PASSWORD: ${POSTGRES_PASSWORD:-gcrf_secure_2024}
      PATRONI_POSTGRESQL_AUTHENTICATION_REPLICATION_USERNAME: ${REPLICATION_USER:-replicator}
      PATRONI_POSTGRESQL_AUTHENTICATION_REPLICATION_PASSWORD: ${REPLICATION_PASSWORD:-repl_secure_2024}
    ports:
      - "8008:8008"
    volumes:
      - ./patroni.yml:/etc/patroni/patroni.yml:ro
    networks:
      - gcrf-network
    restart: unless-stopped

  # PostgreSQL 监控
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: gcrf-postgres-exporter
    hostname: postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-gcrf_secure_2024}@postgres-primary:5432/postgres?sslmode=disable"
    ports:
      - "9187:9187"
    depends_on:
      postgres-primary:
        condition: service_healthy
    networks:
      - gcrf-network
    restart: unless-stopped

  # 备份服务
  postgres-backup:
    image: postgres:15-alpine
    container_name: gcrf-postgres-backup
    hostname: postgres-backup
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gcrf_secure_2024}
      PGHOST: postgres-primary
      PGPORT: 5432
    volumes:
      - ./backup:/backup
      - ./backup-script.sh:/backup-script.sh:ro
    command: >
      sh -c "
      apk add --no-cache dcron
      echo '0 2 * * * /backup-script.sh incremental' > /etc/crontabs/root
      echo '0 3 * * 0 /backup-script.sh full' >> /etc/crontabs/root
      crond -f -l 2
      "
    depends_on:
      postgres-primary:
        condition: service_healthy
    networks:
      - gcrf-network
    restart: unless-stopped

networks:
  gcrf-network:
    driver: bridge
    name: gcrf-network

volumes:
  postgres-primary-data:
    driver: local
    name: gcrf-postgres-primary-data
  postgres-replica1-data:
    driver: local
    name: gcrf-postgres-replica1-data
  postgres-replica2-data:
    driver: local
    name: gcrf-postgres-replica2-data
