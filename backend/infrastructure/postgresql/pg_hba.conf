# ====================================================================
# PostgreSQL Client Authentication Configuration File
# 国创睿峰智能图书馆管理系统 - 访问控制配置
# ====================================================================
#
# 格式:
# TYPE  DATABASE        USER            ADDRESS                 METHOD
#
# TYPE:
#   - local: Unix domain socket连接
#   - host:  TCP/IP连接（包括SSL和非SSL）
#   - hostssl: 仅SSL加密的TCP/IP连接
#   - hostnossl: 仅非SSL的TCP/IP连接
#
# DATABASE:
#   - all: 所有数据库
#   - sameuser: 与用户名相同的数据库
#   - 具体数据库名
#
# USER:
#   - all: 所有用户
#   - 具体用户名
#
# ADDRESS:
#   - 0.0.0.0/0: 所有IPv4地址
#   - ::0/0: 所有IPv6地址
#   - 具体IP地址或CIDR范围
#
# METHOD:
#   - trust: 无条件允许（不推荐用于生产）
#   - reject: 无条件拒绝
#   - scram-sha-256: SCRAM-SHA-256密码认证（推荐）
#   - md5: MD5密码认证（已过时）
#   - password: 明文密码认证（不安全）
#   - peer: 使用操作系统用户名
#
# ====================================================================

# ====================================================================
# 本地连接
# ====================================================================
# 允许本地Unix socket连接（使用peer认证）
local   all             postgres                                peer
local   all             all                                     scram-sha-256

# ====================================================================
# IPv4本地连接
# ====================================================================
# 允许localhost连接
host    all             all             127.0.0.1/32            scram-sha-256

# ====================================================================
# IPv6本地连接
# ====================================================================
# 允许IPv6 localhost连接
host    all             all             ::1/128                 scram-sha-256

# ====================================================================
# 复制连接（主从复制）
# ====================================================================
# 允许replicator用户从任何地址进行流复制
host    replication     replicator      0.0.0.0/0               scram-sha-256
host    replication     replicator      ::0/0                   scram-sha-256

# 允许postgres超级用户进行复制
host    replication     postgres        0.0.0.0/0               scram-sha-256
host    replication     postgres        ::0/0                   scram-sha-256

# ====================================================================
# Docker网络连接（172.x.x.x是Docker默认网段）
# ====================================================================
# 允许Docker容器网络访问
host    all             all             172.16.0.0/12           scram-sha-256
host    all             all             192.168.0.0/16          scram-sha-256

# ====================================================================
# 微服务用户连接
# ====================================================================
# 认证服务
host    auth_service            auth_user           0.0.0.0/0   scram-sha-256
host    auth_service            auth_user           ::0/0       scram-sha-256

# 图书服务
host    book_service            book_user           0.0.0.0/0   scram-sha-256
host    book_service            book_user           ::0/0       scram-sha-256

# 读者服务
host    reader_service          reader_user         0.0.0.0/0   scram-sha-256
host    reader_service          reader_user         ::0/0       scram-sha-256

# 流通服务
host    circulation_service     circulation_user    0.0.0.0/0   scram-sha-256
host    circulation_service     circulation_user    ::0/0       scram-sha-256

# 系统管理服务
host    system_service          system_user         0.0.0.0/0   scram-sha-256
host    system_service          system_user         ::0/0       scram-sha-256

# 推荐服务
host    recommend_service       recommend_user      0.0.0.0/0   scram-sha-256
host    recommend_service       recommend_user      ::0/0       scram-sha-256

# NLP服务
host    nlp_service             nlp_user            0.0.0.0/0   scram-sha-256
host    nlp_service             nlp_user            ::0/0       scram-sha-256

# 视觉服务
host    vision_service          vision_user         0.0.0.0/0   scram-sha-256
host    vision_service          vision_user         ::0/0       scram-sha-256

# 分析服务
host    analytics_service       analytics_user      0.0.0.0/0   scram-sha-256
host    analytics_service       analytics_user      ::0/0       scram-sha-256

# 通知服务
host    notification_service    notification_user   0.0.0.0/0   scram-sha-256
host    notification_service    notification_user   ::0/0       scram-sha-256

# 文件服务
host    file_service            file_user           0.0.0.0/0   scram-sha-256
host    file_service            file_user           ::0/0       scram-sha-256

# 搜索服务
host    search_service          search_user         0.0.0.0/0   scram-sha-256
host    search_service          search_user         ::0/0       scram-sha-256

# ====================================================================
# 超级用户全局访问（谨慎使用）
# ====================================================================
# 允许postgres超级用户从任何地址访问所有数据库
host    all             postgres        0.0.0.0/0               scram-sha-256
host    all             postgres        ::0/0                   scram-sha-256

# ====================================================================
# 生产环境安全建议
# ====================================================================
# 1. 将0.0.0.0/0替换为具体的应用服务器IP地址段
# 2. 使用SSL加密连接（将host改为hostssl）
# 3. 限制超级用户postgres的远程访问
# 4. 定期审查和更新访问规则
# 5. 使用防火墙配合pg_hba.conf进行双重保护
#
# 示例（生产环境）:
# hostssl auth_service    auth_user       10.0.1.0/24     scram-sha-256
# hostssl book_service    book_user       10.0.2.0/24     scram-sha-256
# ====================================================================

# ====================================================================
# 拒绝所有其他连接（可选，更严格的安全策略）
# ====================================================================
# host    all             all             0.0.0.0/0               reject
# host    all             all             ::0/0                   reject
