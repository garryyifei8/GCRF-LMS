# ==================================================================
# 国创睿峰智能图书馆管理系统 - RabbitMQ配置
# 版本: RabbitMQ 3.12
# ==================================================================

# 监听地址
listeners.tcp.default = 5672

# 管理插件监听地址
management.tcp.port = 15672
management.tcp.ip = 0.0.0.0

# 虚拟主机
default_vhost = /

# 用户权限
default_user = admin
default_pass = gcrf_rabbitmq_2024
default_user_tags.administrator = true
default_permissions.configure = .*
default_permissions.read = .*
default_permissions.write = .*

# ==================================================================
# 内存和磁盘配置
# ==================================================================

# 内存水位线（当内存使用超过40%时触发流控）
vm_memory_high_watermark.relative = 0.4

# 磁盘空间阈值（低于50MB时拒绝消息）
disk_free_limit.absolute = 50MB

# ==================================================================
# 连接和通道配置
# ==================================================================

# 最大连接数
num_acceptors.tcp = 10

# 连接超时时间（毫秒）
handshake_timeout = 10000

# 心跳间隔（秒）
heartbeat = 60

# 最大通道数
channel_max = 2047

# 最大帧大小（字节）
frame_max = 131072

# ==================================================================
# 消息持久化配置
# ==================================================================

# 队列数据存储目录
queue_index_embed_msgs_below = 4096

# 持久化消息存储位置（该配置项在此版本中不支持，已注释）
# msg_store_file_size_limit = 16777216
# 注：消息存储文件大小限制现在使用默认值

# ==================================================================
# 集群配置（单节点模式，暂不启用）
# ==================================================================

# cluster_formation.peer_discovery_backend = rabbit_peer_discovery_classic_config
# cluster_formation.classic_config.nodes.1 = rabbit@rabbitmq1
# cluster_formation.classic_config.nodes.2 = rabbit@rabbitmq2

# ==================================================================
# 日志配置
# ==================================================================

# 日志级别: debug, info, warning, error
log.console.level = info
log.console = true
log.file.level = info

# ==================================================================
# 安全配置
# ==================================================================

# 最小密码长度（该配置项在此版本中不支持，已注释）
# minimum_password_length = 8

# ==================================================================
# 性能优化
# ==================================================================

# 预取计数（消费者一次获取多少消息 - 该配置项在此版本中不支持，已注释）
# consumer_prefetch_count = 100
# 注：预取计数应在channel层面设置，不在全局配置

# ==================================================================
# 插件配置
# ==================================================================

# Management插件已在enabled_plugins中启用
# management.load_definitions = /etc/rabbitmq/definitions.json
# 注：暂不加载预定义配置，通过init-queues.sh脚本初始化

# ==================================================================
# 死信队列配置
# ==================================================================

# 消息TTL（毫秒，0表示不过期）
# 具体队列TTL在应用程序中配置
