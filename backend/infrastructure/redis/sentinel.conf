# ==================================================================
# 国创睿峰智能图书馆管理系统 - Redis Sentinel配置
# 版本: Redis 7.2
# 角色: Sentinel(哨兵,用于高可用故障转移)
# ==================================================================

# 绑定地址
bind 0.0.0.0

# 端口
port 26379

# 保护模式
protected-mode no

# ==================================================================
# 核心监控配置
# ==================================================================

# 监控主节点
# sentinel monitor <master-name> <ip> <port> <quorum>
# quorum: 判定主节点客观下线需要的Sentinel数量(这里设置为2,即至少2个Sentinel认为主节点下线)
sentinel monitor mymaster redis-master 6379 2

# 主节点密码
sentinel auth-pass mymaster gcrf_redis_2024

# ==================================================================
# 故障检测配置
# ==================================================================

# 主节点下线判定时间(毫秒)
# Sentinel ping主节点,超过此时间没有有效回复则认为主观下线
sentinel down-after-milliseconds mymaster 30000

# 故障转移超时时间(毫秒)
# 执行故障转移的总超时时间
sentinel failover-timeout mymaster 180000

# 同时进行主从复制的从节点数量
# 故障转移时,限制同时向新主节点进行复制的从节点数量
# 数字越小,故障转移时间越长,但对主节点压力越小
sentinel parallel-syncs mymaster 1

# ==================================================================
# 通知脚本(可选)
# ==================================================================

# 故障转移开始时执行的脚本
# sentinel notification-script mymaster /path/to/notification-script.sh

# 故障转移完成后执行的客户端重配置脚本
# sentinel client-reconfig-script mymaster /path/to/reconfig-script.sh

# ==================================================================
# Sentinel配置
# ==================================================================

# Sentinel工作目录
dir /data

# 日志级别
loglevel notice

# 日志文件
logfile ""

# 是否后台运行(Docker中通常设为no)
daemonize no

# PID文件
pidfile /var/run/redis-sentinel.pid

# ==================================================================
# 拒绝服务保护
# ==================================================================

# TILT模式保护
# 当Sentinel检测到系统时间跳变或负载过高时进入TILT模式
# 进入TILT模式后Sentinel将停止所有监控活动30秒

# ==================================================================
# 其他配置
# ==================================================================

# Sentinel announce-ip和announce-port
# 当Sentinel在NAT或Docker环境中运行时,可能需要配置这两个选项
# sentinel announce-ip <ip>
# sentinel announce-port <port>

# 最小从节点数量
# 当可用从节点数量少于此值时,主节点拒绝写入
# sentinel min-replicas-to-write mymaster 1

# 从节点最大延迟(秒)
# 从节点复制延迟超过此值时,不参与故障转移
# sentinel min-replicas-max-lag mymaster 10

# ==================================================================
# 安全配置
# ==================================================================

# Sentinel自身密码(可选,用于Sentinel间通信)
# requirepass <password>

# ==================================================================
# 故障转移策略
# ==================================================================

# Sentinel选举新主节点的策略:
# 1. 优先级最高的从节点(replica-priority配置)
# 2. 复制偏移量最大的从节点(数据最新)
# 3. run_id最小的从节点

# ==================================================================
# 监控配置持久化
# ==================================================================

# Sentinel会自动更新配置文件,记录:
# - 主节点状态变化
# - 从节点列表变化
# - 其他Sentinel信息
# 因此需要确保配置文件有写权限
