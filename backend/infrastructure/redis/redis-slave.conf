# ==================================================================
# 国创睿峰智能图书馆管理系统 - Redis从节点配置
# 版本: Redis 7.2
# 角色: Slave/Replica
# ==================================================================

# 绑定地址
bind 0.0.0.0

# 端口
port 6379

# 保护模式
protected-mode no

# 密码认证
requirepass gcrf_redis_2024
masterauth gcrf_redis_2024

# ==================================================================
# 持久化配置(与主节点相同)
# ==================================================================

# RDB持久化
save 900 1
save 300 10
save 60 10000

dbfilename dump.rdb
dir /data
rdbcompression yes
rdbchecksum yes

# AOF持久化
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# ==================================================================
# 从节点特定配置
# ==================================================================

# 从节点只读模式(推荐开启)
replica-read-only yes

# 从节点优先级(数字越小优先级越高,用于Sentinel选举新主节点)
# 0表示永不晋升为主节点
replica-priority 100

# 主节点连接配置
# replicaof命令在docker-compose中动态指定

# 从节点发送REPLCONF ACK命令的频率(秒)
repl-ping-replica-period 10

# 主从复制超时时间(秒)
repl-timeout 60

# 是否禁用TCP_NODELAY(用于主从复制)
# yes: 启用Nagle算法,减少带宽但增加延迟
# no: 禁用Nagle算法,减少延迟但增加带宽
repl-disable-tcp-nodelay no

# 从节点backlog大小(用于部分重同步)
repl-backlog-size 1mb

# backlog保留时间(秒,主节点断开连接后保留多久)
repl-backlog-ttl 3600

# ==================================================================
# 内存管理(与主节点相同)
# ==================================================================

maxmemory 2gb
maxmemory-policy allkeys-lru
maxmemory-samples 5

# ==================================================================
# 连接配置
# ==================================================================

maxclients 10000
timeout 300
tcp-keepalive 300
tcp-backlog 511

# ==================================================================
# 慢查询日志
# ==================================================================

slowlog-log-slower-than 10000
slowlog-max-len 128

# ==================================================================
# 其他配置
# ==================================================================

stop-writes-on-bgsave-error yes
loglevel notice
logfile ""
databases 16

# 禁用危险命令
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command CONFIG ""

# 键空间通知
notify-keyspace-events Ex

# ==================================================================
# 性能优化
# ==================================================================

hash-max-ziplist-entries 512
hash-max-ziplist-value 64
list-max-ziplist-size -2
list-compress-depth 0
set-max-intset-entries 512
zset-max-ziplist-entries 128
zset-max-ziplist-value 64
hll-sparse-max-bytes 3000
stream-node-max-bytes 4096
stream-node-max-entries 100

activedefrag yes
active-defrag-ignore-bytes 100mb
active-defrag-threshold-lower 10
active-defrag-threshold-upper 100
active-defrag-cycle-min 5
active-defrag-cycle-max 75

# ==================================================================
# 监控统计
# ==================================================================

latency-monitor-threshold 100

# ==================================================================
# Lua脚本配置
# ==================================================================

lua-time-limit 5000
