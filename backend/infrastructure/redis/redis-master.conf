# ==================================================================
# 国创睿峰智能图书馆管理系统 - Redis主节点配置
# 版本: Redis 7.2
# 角色: Master
# ==================================================================

# 绑定地址(允许所有网络访问)
bind 0.0.0.0

# 端口
port 6379

# 保护模式(关闭以允许远程连接)
protected-mode no

# 密码认证
requirepass gcrf_redis_2024
masterauth gcrf_redis_2024

# ==================================================================
# 持久化配置
# ==================================================================

# RDB持久化 - 快照方式
# 900秒内至少1个key变化
save 900 1
# 300秒内至少10个key变化
save 300 10
# 60秒内至少10000个key变化
save 60 10000

# RDB文件名
dbfilename dump.rdb

# RDB文件目录
dir /data

# RDB文件压缩
rdbcompression yes

# RDB文件校验
rdbchecksum yes

# AOF持久化 - 追加日志方式
appendonly yes
appendfilename "appendonly.aof"

# AOF同步策略
# always: 每次写入都同步(最安全但性能最低)
# everysec: 每秒同步一次(推荐,平衡性能和安全)
# no: 由操作系统决定何时同步(性能最高但最不安全)
appendfsync everysec

# AOF重写配置
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# ==================================================================
# 内存管理
# ==================================================================

# 最大内存限制(2GB)
maxmemory 2gb

# 内存淘汰策略
# allkeys-lru: 所有key使用LRU算法淘汰
# volatile-lru: 只对设置了过期时间的key使用LRU
# allkeys-lfu: 所有key使用LFU算法淘汰(Redis 4.0+)
# volatile-lfu: 只对设置了过期时间的key使用LFU
maxmemory-policy allkeys-lru

# 内存样本数量(用于LRU/LFU算法)
maxmemory-samples 5

# ==================================================================
# 连接配置
# ==================================================================

# 最大客户端连接数
maxclients 10000

# 客户端超时时间(秒,0表示禁用)
timeout 300

# TCP连接保活
tcp-keepalive 300

# TCP backlog队列长度
tcp-backlog 511

# ==================================================================
# 慢查询日志
# ==================================================================

# 慢查询阈值(微秒)
slowlog-log-slower-than 10000

# 慢查询日志最大长度
slowlog-max-len 128

# ==================================================================
# 主从复制配置
# ==================================================================

# 从节点只读
replica-read-only yes

# 从节点优先级(用于Sentinel选举)
replica-priority 100

# ==================================================================
# 其他配置
# ==================================================================

# 后台保存出错时停止写入
stop-writes-on-bgsave-error yes

# 日志级别
# debug: 大量信息,用于开发/测试
# verbose: 包含很多不太有用的信息
# notice: 适度冗长,用于生产环境
# warning: 只记录警告和错误
loglevel notice

# 日志文件(空字符串表示标准输出)
logfile ""

# 数据库数量
databases 16

# ==================================================================
# 安全配置
# ==================================================================

# 禁用危险命令
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command CONFIG ""

# 启用键空间通知(用于监控)
notify-keyspace-events Ex

# ==================================================================
# 性能优化
# ==================================================================

# 哈希编码优化
hash-max-ziplist-entries 512
hash-max-ziplist-value 64

# 列表编码优化
list-max-ziplist-size -2
list-compress-depth 0

# 集合编码优化
set-max-intset-entries 512

# 有序集合编码优化
zset-max-ziplist-entries 128
zset-max-ziplist-value 64

# HyperLogLog稀疏表示优化
hll-sparse-max-bytes 3000

# 流(Streams)优化
stream-node-max-bytes 4096
stream-node-max-entries 100

# 活跃碎片整理
activedefrag yes
active-defrag-ignore-bytes 100mb
active-defrag-threshold-lower 10
active-defrag-threshold-upper 100
active-defrag-cycle-min 5
active-defrag-cycle-max 75

# ==================================================================
# 监控统计
# ==================================================================

# 启用延迟监控
latency-monitor-threshold 100

# ==================================================================
# Lua脚本配置
# ==================================================================

# Lua脚本执行超时时间(毫秒)
lua-time-limit 5000
