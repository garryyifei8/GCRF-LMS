spring:
  # Datasource is dynamically configured by BaseIntegrationTest via @DynamicPropertySource
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      initial-size: 1
      min-idle: 1
      max-active: 5

  # Flyway migrations are automatically executed for schema initialization
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # Redis
  redis:
    host: localhost
    port: 6379
    password: gcrf_redis_2024
    database: 6  # Different from production

  # RabbitMQ (disabled for integration tests to avoid external dependency)
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false

  # Mail (dummy config for tests — real sends will fail but context loads)
  mail:
    host: localhost
    port: 25
    username: test
    password: test
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false
        debug: false

logging:
  level:
    com.gcrf.library: DEBUG
    org.springframework: INFO
