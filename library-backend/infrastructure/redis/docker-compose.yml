version: '3.8'

services:
  redis:
    image: redis:7.0-alpine
    container_name: library-redis
    restart: always
    command: redis-server /usr/local/etc/redis/redis.conf
    environment:
      TZ: Asia/Shanghai
    ports:
      - "6379:6379"
    volumes:
      - ./data:/data
      - ./redis.conf:/usr/local/etc/redis/redis.conf
      - ./logs:/var/log/redis
    networks:
      - library-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

networks:
  library-network:
    external: true

volumes:
  redis-data:
  redis-logs:
