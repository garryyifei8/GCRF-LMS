version: '3.8'

services:
  web-admin:
    image: gcrf-library-web-admin:amd64
    container_name: gcrf-web-admin
    ports:
      - "3011:80"
    environment:
      - TZ=Asia/Shanghai
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck.sh"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - gcrf-network

networks:
  gcrf-network:
    driver: bridge
    name: gcrf-network
