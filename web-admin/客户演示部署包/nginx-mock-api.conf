# Nginx Mock API 配置
# 不依赖 Service Worker，直接由 nginx 返回 Mock 数据
# 适用于 HTTP 环境（不需要 HTTPS）

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript
               application/x-javascript application/xml+rss application/json
               application/javascript image/svg+xml;

    # 登录接口
    location = /api/v1/auth/login {
        default_type application/json;
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS';
        add_header Access-Control-Allow-Headers 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization';

        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS';
            add_header Access-Control-Allow-Headers 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization';
            add_header Access-Control-Max-Age 1728000;
            add_header Content-Type 'text/plain; charset=utf-8';
            add_header Content-Length 0;
            return 204;
        }

        return 200 '{
            "code": 200,
            "message": "登录成功",
            "data": {
                "token": "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOjEsInVzZXJuYW1lIjoiYWRtaW4iLCJpYXQiOjE2OTk5OTk5OTksImV4cCI6MTcwMDAwMDAwMH0.mock-signature",
                "user": {
                    "id": 1,
                    "username": "admin",
                    "realName": "系统管理员",
                    "role": "admin",
                    "roleName": "管理员",
                    "avatar": "https://i.pravatar.cc/150?img=1",
                    "email": "admin@gcrf.com",
                    "phone": "13800138000",
                    "status": "active",
                    "permissions": ["*"]
                }
            }
        }';
    }

    # 用户信息接口
    location = /api/v1/auth/user/info {
        default_type application/json;
        add_header Access-Control-Allow-Origin *;
        return 200 '{
            "code": 200,
            "message": "获取成功",
            "data": {
                "id": 1,
                "username": "admin",
                "realName": "系统管理员",
                "role": "admin",
                "roleName": "管理员",
                "avatar": "https://i.pravatar.cc/150?img=1",
                "email": "admin@gcrf.com",
                "phone": "13800138000",
                "status": "active",
                "permissions": ["*"]
            }
        }';
    }

    # 图书列表（简化版，只返回少量数据）
    location = /api/v1/books {
        default_type application/json;
        add_header Access-Control-Allow-Origin *;
        return 200 '{
            "code": 200,
            "message": "获取成功",
            "data": {
                "list": [
                    {
                        "id": 1,
                        "isbn": "978-7-5086-9972-9",
                        "title": "三体",
                        "author": "刘慈欣",
                        "publisher": "重庆出版社",
                        "category": "科幻小说",
                        "status": "available",
                        "total": 10,
                        "available": 8
                    },
                    {
                        "id": 2,
                        "isbn": "978-7-5302-1761-8",
                        "title": "活着",
                        "author": "余华",
                        "publisher": "作家出版社",
                        "category": "文学",
                        "status": "available",
                        "total": 5,
                        "available": 3
                    }
                ],
                "total": 100,
                "page": 1,
                "pageSize": 20
            }
        }';
    }

    # 通用 API Mock - 返回成功响应
    location ~ ^/api/v1/ {
        default_type application/json;
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods 'GET, POST, PUT, DELETE, OPTIONS';
        add_header Access-Control-Allow-Headers 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization';

        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods 'GET, POST, PUT, DELETE, OPTIONS';
            add_header Access-Control-Allow-Headers 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization';
            add_header Access-Control-Max-Age 1728000;
            add_header Content-Type 'text/plain; charset=utf-8';
            add_header Content-Length 0;
            return 204;
        }

        return 200 '{
            "code": 200,
            "message": "操作成功",
            "data": {
                "list": [],
                "total": 0
            }
        }';
    }

    # SPA 路由支持
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # 静态资源缓存
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 健康检查端点
    location /health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }
}
