version: '3.8'

services:
  # 前端 Web 管理端
  web-admin:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gcrf-library-web-admin
    ports:
      - "3000:80"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    volumes:
      # 挂载 nginx 日志
      - ./logs/nginx:/var/log/nginx
    networks:
      - library-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  library-network:
    driver: bridge
