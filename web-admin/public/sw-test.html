<!DOCTYPE html>
<html>
<head>
    <title>Service Worker 测试</title>
    <meta charset="UTF-8">
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .status { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
        button { padding: 10px 20px; margin: 10px 5px; cursor: pointer; }
        #log { background: #f5f5f5; padding: 10px; border-radius: 5px; margin-top: 20px; max-height: 400px; overflow-y: auto; }
        .log-entry { margin: 5px 0; font-family: monospace; font-size: 12px; }
    </style>
</head>
<body>
    <h1>Service Worker 状态检测</h1>

    <div id="swStatus" class="status info">检测中...</div>

    <div>
        <button onclick="checkServiceWorker()">重新检测</button>
        <button onclick="testLoginAPI()">测试登录API</button>
        <button onclick="unregisterSW()">注销Service Worker</button>
        <button onclick="reloadPage()">刷新页面</button>
    </div>

    <div id="log"></div>

    <script>
        function log(message, type = 'info') {
            const logDiv = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function checkServiceWorker() {
            const statusDiv = document.getElementById('swStatus');

            if (!('serviceWorker' in navigator)) {
                statusDiv.className = 'status error';
                statusDiv.textContent = '❌ 浏览器不支持 Service Worker';
                log('浏览器不支持 Service Worker', 'error');
                return;
            }

            log('开始检测 Service Worker...', 'info');

            navigator.serviceWorker.getRegistrations().then(registrations => {
                log(`找到 ${registrations.length} 个 Service Worker 注册`, 'info');

                if (registrations.length === 0) {
                    statusDiv.className = 'status error';
                    statusDiv.innerHTML = '❌ Service Worker 未注册<br><small>请访问主页并刷新</small>';
                    log('没有注册的 Service Worker', 'error');
                } else {
                    registrations.forEach((reg, index) => {
                        log(`Service Worker #${index + 1}:`, 'info');
                        log(`  Scope: ${reg.scope}`, 'info');
                        log(`  状态: ${reg.active ? 'Active' : reg.installing ? 'Installing' : reg.waiting ? 'Waiting' : 'Unknown'}`, 'info');

                        if (reg.active) {
                            statusDiv.className = 'status success';
                            statusDiv.textContent = '✅ Service Worker 已激活并运行';
                            log(`Service Worker scriptURL: ${reg.active.scriptURL}`, 'success');
                        }
                    });
                }

                // 检查controller
                if (navigator.serviceWorker.controller) {
                    log(`✅ 当前页面由 Service Worker 控制`, 'success');
                    log(`Controller URL: ${navigator.serviceWorker.controller.scriptURL}`, 'info');
                } else {
                    log(`⚠️ 当前页面未被 Service Worker 控制，需要刷新页面`, 'warning');
                }
            });
        }

        async function testLoginAPI() {
            log('测试登录 API...', 'info');

            try {
                const response = await fetch('/api/v1/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: 'admin',
                        password: 'admin123'
                    })
                });

                log(`API 响应状态: ${response.status}`, 'info');
                log(`响应头: ${JSON.stringify([...response.headers])}`, 'info');

                const data = await response.json();
                log(`✅ API 响应数据: ${JSON.stringify(data, null, 2)}`, 'success');

            } catch (error) {
                log(`❌ API 请求失败: ${error.message}`, 'error');
                console.error('登录测试失败:', error);
            }
        }

        async function unregisterSW() {
            log('注销所有 Service Worker...', 'info');
            const registrations = await navigator.serviceWorker.getRegistrations();
            for (let registration of registrations) {
                await registration.unregister();
                log('✅ Service Worker 已注销', 'success');
            }
            log('请刷新页面重新注册', 'info');
        }

        function reloadPage() {
            window.location.reload();
        }

        // 页面加载时检测
        window.addEventListener('load', () => {
            log('页面加载完成', 'info');
            checkServiceWorker();

            // 监听 Service Worker 状态变化
            navigator.serviceWorker.ready.then(registration => {
                log('✅ Service Worker ready', 'success');
            });

            navigator.serviceWorker.addEventListener('controllerchange', () => {
                log('⚠️ Service Worker controller changed', 'warning');
                checkServiceWorker();
            });
        });
    </script>
</body>
</html>
